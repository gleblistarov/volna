<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ВОЛНА">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0C0D10">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>ВОЛНА — функциональный тренинг как игра</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0C0D10; --bg2:#131519; --surf:#171A20; --surf2:#1E222A; --surf3:#262B35;
  --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.13);
  --tx:#F2F4F7; --tx2:#9AA1AD; --tx3:#646B78;
  --p1:#C7F751; --p1d:#1d2410; --p1t:#dcff7a;      /* athlete 1 — lime */
  --p2:#FF6B7E; --p2d:#2a1418; --p2t:#ff97a5;      /* athlete 2 — coral */
  --gold:#FFC247; --blue:#5BA8FF; --vio:#A98BFF;
  --r:14px; --r2:20px;
  --safe: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--tx);font-family:'Manrope',system-ui,sans-serif;overscroll-behavior-y:none}
body{max-width:760px;margin:0 auto;min-height:100vh;position:relative}
.bebas{font-family:'Bebas Neue',sans-serif;letter-spacing:.02em;font-weight:400}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit}
::-webkit-scrollbar{width:0;height:0}

/* layout */
#app{padding:0 16px calc(96px + var(--safe))}
.topbar{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,var(--bg) 70%,transparent);padding:16px 16px 10px;display:flex;align-items:center;justify-content:space-between;max-width:760px;margin:0 auto}
.logo{display:flex;align-items:center;gap:10px}
.logo .mark{width:34px;height:34px;border-radius:10px;background:var(--p1);display:flex;align-items:center;justify-content:center;color:#0C0D10}
.logo .mark svg{width:20px;height:20px}
.logo .name{font-size:30px;line-height:.8;color:var(--tx)}
.logo .sub{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--tx3);margin-top:3px}

/* bottom nav */
.nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:760px;z-index:40;
  background:rgba(13,14,17,.86);backdrop-filter:blur(18px);border-top:1px solid var(--line);
  display:grid;grid-template-columns:repeat(5,1fr);padding:8px 8px calc(8px + var(--safe))}
.nav button{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 0;color:var(--tx3);border-radius:12px;transition:color .15s}
.nav button svg{width:23px;height:23px}
.nav button span{font-size:10px;font-weight:600;letter-spacing:.01em}
.nav button.on{color:var(--tx)}
.nav button.on.start{color:var(--bg)}
.nav .start{position:relative}
.nav .start .fab{width:50px;height:50px;border-radius:16px;background:var(--p1);display:flex;align-items:center;justify-content:center;color:#0C0D10;margin-top:-22px;box-shadow:0 8px 24px rgba(199,247,81,.35);transition:transform .15s}
.nav .start:active .fab{transform:scale(.92)}
.nav .start svg{width:26px;height:26px}
.nav .start span{margin-top:2px;color:var(--tx2)}

/* generic */
.card{background:var(--surf);border:1px solid var(--line);border-radius:var(--r2);padding:18px}
.row{display:flex;align-items:center;gap:12px}
.muted{color:var(--tx2)}.dim{color:var(--tx3)}
.h-sec{font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--tx3);margin:26px 2px 12px}
.pill{font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px;letter-spacing:.04em;text-transform:uppercase;display:inline-flex;align-items:center;gap:4px}
.fade{animation:fade .4s ease both}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.view{display:none}.view.on{display:block}

/* hero athlete cards */
.athletes{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px}
.acard{border-radius:var(--r2);padding:16px 14px;position:relative;overflow:hidden;border:1px solid var(--line);background:var(--surf)}
.acard.a1{box-shadow:inset 0 0 0 1px rgba(199,247,81,.18)}
.acard.a2{box-shadow:inset 0 0 0 1px rgba(255,107,126,.18)}
.acard .glow{position:absolute;inset:0;opacity:.10;pointer-events:none}
.acard.a1 .glow{background:radial-gradient(120px 80px at 80% 0%,var(--p1),transparent)}
.acard.a2 .glow{background:radial-gradient(120px 80px at 80% 0%,var(--p2),transparent)}
.avatar{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:24px;color:#0C0D10}
.a1 .avatar{background:var(--p1)} .a2 .avatar{background:var(--p2)}
.lvl{font-family:'Bebas Neue';font-size:40px;line-height:.8}
.a1 .lvl{color:var(--p1t)} .a2 .lvl{color:var(--p2t)}
.rankname{font-size:11px;font-weight:700;letter-spacing:.04em}
.xpbar{height:7px;border-radius:99px;background:var(--surf3);overflow:hidden;margin-top:10px}
.xpbar i{display:block;height:100%;border-radius:99px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.a1 .xpbar i{background:var(--p1)} .a2 .xpbar i{background:var(--p2)}
.statline{display:flex;justify-content:space-between;margin-top:12px;font-size:12px}
.statline b{font-family:'Bebas Neue';font-size:22px;display:block;line-height:.9;font-weight:400}
.a1 .statline b{color:var(--tx)} .a2 .statline b{color:var(--tx)}

/* versus */
.vs{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-top:8px}
.vsbar{height:30px;border-radius:9px;display:flex;overflow:hidden;background:var(--surf3)}
.vsbar .l{background:var(--p1)} .vsbar .r{background:var(--p2)}
.vs .mid{font-family:'Bebas Neue';font-size:18px;color:var(--tx3);padding:0 4px}

/* workout list */
.wod{border:1px solid var(--line);border-radius:var(--r2);background:var(--surf);overflow:hidden;margin-bottom:12px;transition:border-color .15s}
.wod:active{border-color:var(--line2)}
.wod .top{display:flex;gap:13px;padding:15px;align-items:center}
.wod .ic{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wod .ic svg{width:25px;height:25px}
.wod h3{margin:0;font-size:17px;font-weight:800}
.wod .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
.tag{font-size:10px;font-weight:700;letter-spacing:.03em;color:var(--tx2);background:var(--surf2);padding:3px 8px;border-radius:7px;text-transform:uppercase}
.chev{color:var(--tx3);flex-shrink:0;transition:transform .2s}
.chev.open{transform:rotate(180deg)}
.wbody{display:none;border-top:1px solid var(--line);padding:6px 15px 15px}
.wbody.open{display:block}
.blk{margin-top:13px}
.blk .bh{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.blk .bt{font-size:14px;font-weight:800}
.blk .bf{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--tx3)}
.blk .bs{font-size:12px;color:var(--tx2);margin:2px 0 8px}
.ex{display:flex;gap:9px;padding:7px 0;border-top:1px dashed var(--line)}
.ex .d{width:5px;height:5px;border-radius:9px;background:var(--tx3);margin-top:8px;flex-shrink:0}
.ex .n{flex:1;font-size:13px;font-weight:600}
.ex .n small{display:block;font-weight:500;color:var(--tx2);font-size:11px;margin-top:1px}
.ex .a{font-size:12px;color:var(--tx2);white-space:nowrap;font-weight:700}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:14px;font-weight:800;font-size:14px;transition:transform .12s,opacity .15s}
.btn:active{transform:scale(.98)}
.btn.go{background:var(--p1);color:#0C0D10;margin-top:14px}
.btn.go svg{width:18px;height:18px}
.btn.ghost{background:var(--surf2);color:var(--tx);border:1px solid var(--line)}
.btn.coral{background:var(--p2);color:#0C0D10}

/* segmented */
.seg{display:flex;background:var(--surf);border:1px solid var(--line);border-radius:13px;padding:4px;gap:4px;margin-top:4px}
.seg button{flex:1;padding:9px;border-radius:9px;font-size:13px;font-weight:700;color:var(--tx2);transition:.15s}
.seg button.on{background:var(--surf3);color:var(--tx)}

/* glossary move */
.move{border:1px solid var(--line);border-radius:var(--r);background:var(--surf);padding:13px 14px;margin-bottom:9px}
.move h4{margin:0 0 3px;font-size:14px;font-weight:800;display:flex;align-items:center;gap:8px}
.move .mu{font-size:11px;font-weight:700;color:var(--p1t);text-transform:uppercase;letter-spacing:.04em}
.move p{margin:5px 0 0;font-size:12.5px;color:var(--tx2);line-height:1.55}
.move .sv{margin-top:7px;font-size:12px;color:var(--tx)}
.move .sv b{color:var(--vio);font-weight:700}

/* progress */
.stats4{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.sbox{background:var(--surf);border:1px solid var(--line);border-radius:var(--r);padding:14px}
.sbox .v{font-family:'Bebas Neue';font-size:34px;line-height:.85}
.sbox .k{font-size:11px;color:var(--tx2);font-weight:600;margin-top:3px}
.chart{display:flex;align-items:flex-end;gap:5px;height:120px;margin-top:6px}
.chart .c{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;justify-content:flex-end;height:100%}
.chart .bar{width:100%;border-radius:6px 6px 3px 3px;min-height:3px;transition:height .5s}
.chart .lab{font-size:9px;color:var(--tx3);font-weight:600}
.hist{border-left:2px solid var(--line);margin-left:6px;padding-left:16px}
.hev{position:relative;padding:10px 0;border-bottom:1px solid var(--line)}
.hev::before{content:'';position:absolute;left:-23px;top:15px;width:9px;height:9px;border-radius:9px;background:var(--surf3);border:2px solid var(--bg)}
.hev.p1::before{background:var(--p1)} .hev.p2::before{background:var(--p2)}
.hev .t{font-size:14px;font-weight:700}
.hev .m{font-size:11px;color:var(--tx2);margin-top:2px}
.hev .sc{font-family:'Bebas Neue';font-size:16px;float:right;color:var(--gold)}

/* badges */
.badges{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.badge{aspect-ratio:1;border:1px solid var(--line);border-radius:var(--r);background:var(--surf);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8px;gap:5px;position:relative;overflow:hidden}
.badge.lock{opacity:.4}
.badge .bi{width:38px;height:38px;display:flex;align-items:center;justify-content:center}
.badge .bi svg{width:30px;height:30px}
.badge .bn{font-size:10px;font-weight:700;line-height:1.15}
.badge.got{box-shadow:inset 0 0 0 1px rgba(255,194,71,.4)}
.badge.got .bi{color:var(--gold)}
.badge.lock .bi{color:var(--tx3)}

/* roulette */
.roul{height:200px;border:1px solid var(--line);border-radius:var(--r2);background:var(--surf);overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}
.roul .needle{position:absolute;left:0;right:0;top:50%;height:64px;transform:translateY(-50%);border-top:2px solid var(--p1);border-bottom:2px solid var(--p1);pointer-events:none;z-index:3}
.reel{position:absolute;width:100%}
.ritem{height:64px;display:flex;align-items:center;justify-content:center;gap:10px;font-family:'Bebas Neue';font-size:30px;color:var(--tx2)}
.ritem .ri{width:34px;height:34px;display:flex;align-items:center;justify-content:center}

/* modal / live */
.scrim{position:fixed;inset:0;z-index:60;background:rgba(8,9,11,.8);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:16px}
.scrim.on{display:flex}
.sheet{background:var(--bg2);border:1px solid var(--line2);border-radius:24px;width:100%;max-width:520px;max-height:92vh;overflow:auto;padding:22px}
.toast{position:fixed;left:50%;bottom:calc(110px + var(--safe));transform:translateX(-50%) translateY(20px);z-index:80;background:var(--surf3);border:1px solid var(--line2);border-radius:14px;padding:12px 18px;font-weight:700;font-size:14px;opacity:0;transition:.3s;pointer-events:none;display:flex;align-items:center;gap:9px;max-width:90%}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast svg{width:20px;height:20px;color:var(--gold);flex-shrink:0}

/* live screen */
#live{position:fixed;inset:0;z-index:70;background:var(--bg);max-width:760px;margin:0 auto;display:none;flex-direction:column;padding:calc(16px + var(--safe)) 18px calc(20px + var(--safe))}
#live.on{display:flex}
.live-top{display:flex;align-items:center;justify-content:space-between}
.iconbtn{width:40px;height:40px;border-radius:12px;background:var(--surf2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center}
.iconbtn svg{width:20px;height:20px}
.live-prog{display:flex;gap:5px;margin:16px 0 4px}
.live-prog i{flex:1;height:4px;border-radius:9px;background:var(--surf3)}
.live-prog i.done{background:var(--tx2)} .live-prog i.now{background:var(--p1)}
.timer{font-family:'Bebas Neue';font-size:120px;line-height:.8;text-align:center;font-variant-numeric:tabular-nums;letter-spacing:.01em}
.timersub{text-align:center;font-size:13px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--tx3)}
.ring{width:230px;height:230px;margin:0 auto;position:relative}
.ring svg{transform:rotate(-90deg)}
.ring .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ctrls{display:flex;gap:10px;margin-top:8px}
.ctrls .btn{flex:1}
.exlist{flex:1;overflow:auto;margin-top:4px}
.exli{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--line);align-items:center}
.exli .num{width:24px;height:24px;border-radius:8px;background:var(--surf3);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:14px;color:var(--tx2);flex-shrink:0}
.exli .nm{flex:1;font-size:15px;font-weight:700}
.exli .nm small{display:block;font-weight:500;font-size:12px;color:var(--tx2)}
.exli .rp{font-family:'Bebas Neue';font-size:22px;color:var(--p1t)}
.scoreinput{display:flex;gap:8px;align-items:center;margin-top:8px}
.scoreinput input{flex:1;background:var(--surf);border:1px solid var(--line2);border-radius:12px;padding:13px;color:var(--tx);font-size:18px;font-weight:700;text-align:center}
.stepper{display:flex;align-items:center;gap:14px;justify-content:center;margin:18px 0}
.stepper button{width:54px;height:54px;border-radius:16px;background:var(--surf2);border:1px solid var(--line2);font-family:'Bebas Neue';font-size:30px;color:var(--tx)}
.stepper .val{font-family:'Bebas Neue';font-size:64px;min-width:90px;text-align:center;line-height:.8}
.whochip{display:flex;gap:8px;margin-top:10px}
.whochip button{flex:1;padding:12px;border-radius:13px;border:1px solid var(--line);background:var(--surf);font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px}
.whochip button.on1{background:var(--p1);color:#0C0D10;border-color:var(--p1)}
.whochip button.on2{background:var(--p2);color:#0C0D10;border-color:var(--p2)}
.lvlup{text-align:center}
.lvlup .big{font-family:'Bebas Neue';font-size:70px;line-height:.8}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:90;overflow:hidden}
.cpiece{position:absolute;width:9px;height:14px;border-radius:2px;will-change:transform,opacity;animation:cfall linear forwards}
@keyframes cfall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:.9}}

/* block info during live */
.binfo{background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-top:10px}
.binfo-h{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.binfo-h b{font-size:14px;font-weight:800}
.binfo-h span{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--p1t)}
.binfo-s{font-size:12px;color:var(--tx2);margin-top:3px;line-height:1.45}
.bex{margin-top:9px;border-top:1px dashed var(--line);padding-top:6px}
.bexr{display:flex;justify-content:space-between;gap:10px;padding:5px 0;font-size:13px}
.bexr span{color:var(--tx);font-weight:600}
.bexr b{color:var(--tx2);font-weight:700;white-space:nowrap}
.bexr.hot span{color:var(--p1t)}

/* timer progress bar */
.tprog{height:6px;background:var(--surf3);border-radius:9px;overflow:hidden;margin:2px 0 6px}
.tprog i{display:block;height:100%;background:var(--p1);width:100%;transition:width .25s linear}
.tprog.rest i{background:var(--p2)}

/* round/set counter */
.rcount{display:flex;align-items:center;justify-content:center;gap:14px;margin:6px 0}
.rcount button{width:42px;height:42px;border-radius:12px;background:var(--surf2);border:1px solid var(--line2);font-family:'Bebas Neue';font-size:24px;color:var(--tx)}
.rcount .rv{font-family:'Bebas Neue';font-size:30px;min-width:80px;text-align:center}
.rcount .rv small{display:block;font-family:'Manrope';font-size:10px;font-weight:600;color:var(--tx3);letter-spacing:.08em;margin-top:-4px}

/* sound toggle in live top */
.lvtools{display:flex;gap:8px}

/* toggle switch */
.tgl{display:flex;align-items:center;justify-content:space-between;padding:13px;background:var(--surf);border:1px solid var(--line);border-radius:13px;margin-bottom:10px}
.tgl .lab{font-size:14px;font-weight:700}
.tgl .lab small{display:block;font-weight:500;font-size:11px;color:var(--tx2);margin-top:1px}
.sw{width:48px;height:28px;border-radius:99px;background:var(--surf3);position:relative;transition:background .2s;flex-shrink:0}
.sw.on{background:var(--p1)}
.sw i{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:99px;background:#fff;transition:left .2s}
.sw.on i{left:23px}

/* builder */
.bld-mv{display:flex;align-items:center;gap:9px;padding:11px 13px;border:1px solid var(--line);border-radius:12px;background:var(--surf);margin-bottom:8px}
.bld-mv.sel{border-color:var(--p1);background:var(--p1d)}
.bld-mv .nm{flex:1;font-size:13px;font-weight:700}
.bld-mv .cat{font-size:10px;color:var(--tx3);font-weight:700;text-transform:uppercase}
.bld-mv .ck{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--line2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bld-mv.sel .ck{background:var(--p1);border-color:var(--p1);color:#0C0D10}
.bld-mv.sel .ck svg{width:14px;height:14px}
.hdel{position:absolute;right:0;top:11px;width:26px;height:26px;border-radius:7px;background:var(--surf2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--tx3)}
.hdel svg{width:14px;height:14px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M2 13c2.5 0 2.5-4 5-4s2.5 4 5 4 2.5-4 5-4 2.5 4 5 4" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><path d="M2 18c2.5 0 2.5-3 5-3s2.5 3 5 3 2.5-3 5-3 2.5 3 5 3" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" opacity=".5"/></svg></div>

/* ---------- settings (sound/haptics) ---------- */
let SOUND = localStorage.getItem('volna_sound')!=='0';
let HAPTIC = localStorage.getItem('volna_haptic')!=='0';
function setSound(v){SOUND=v;localStorage.setItem('volna_sound',v?'1':'0');}
function setHaptic(v){HAPTIC=v;localStorage.setItem('volna_haptic',v?'1':'0');}

/* ---------- sound + haptics ---------- */
let AC;
function ensureAC(){try{AC=AC||new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();}catch(e){}}
function beep(freq,dur,vol,type){if(!SOUND)return;try{ensureAC();const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.frequency.value=freq;o.type=type||'sine';g.gain.setValueAtTime(vol||.25,AC.currentTime);g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+(dur||.15));o.start();o.stop(AC.currentTime+(dur||.15));}catch(e){}}
function vibrate(p){if(!HAPTIC)return;try{if(navigator.vibrate)navigator.vibrate(p);}catch(e){}}
function beepCue(n){const f=n===3?520:n===2?620:760;beep(f,.18,.3,'square');}      // 3-2-1 lead-in
function beepGo(){beep(960,.28,.34,'square');}                                       // GO
function beepTick(){beep(680,.07,.18);}                                              // small tick
function beepRest(){beep(420,.18,.28,'sine');}                                       // rest start
function beepDone(){beep(523,.13);setTimeout(()=>beep(659,.13),130);setTimeout(()=>beep(880,.3),260);} // finish triad

/* ---------- wake lock (keep screen on) ---------- */
let wakeLock=null;
async function acquireWake(){try{if('wakeLock'in navigator)wakeLock=await navigator.wakeLock.request('screen');}catch(e){}}
function releaseWake(){try{if(wakeLock){wakeLock.release();wakeLock=null;}}catch(e){}}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&document.getElementById('live').classList.contains('on'))acquireWake();});

/* ====================== state (cloud-synced) ====================== */
const CODE_KEY='volna_room_code', CACHE_KEY='volna_cache_v2', PEND_KEY='volna_pending_v2';
let S=null, NEED_CODE=false, lastSig='';
function getCode(){return localStorage.getItem(CODE_KEY)||'';}
function hdr(){const h={'Content-Type':'application/json'};const c=getCode();if(c)h['X-Room-Code']=c;return h;}
function pending(){try{return JSON.parse(localStorage.getItem(PEND_KEY)||'[]');}catch(e){return[];}}
function setPending(a){try{localStorage.setItem(PEND_KEY,JSON.stringify(a));}catch(e){}}
function fresh(){return{ath:[{name:'Глеб',xp:0},{name:'Партнёр',xp:0}],history:[],ach:[],setup:false};}
function rebuild(data){
  const names=(data&&data.names)||[];
  S={ath:[{name:names[0]||'Глеб',xp:0},{name:names[1]||'Партнёр',xp:0}],history:[],ach:[],setup:!!((names[0]||'').trim()||(names[1]||'').trim())};
  const seen=new Set();
  const all=[...((data&&data.events)||[]),...pending()].filter(ev=>{if(!ev||!ev.id||seen.has(ev.id))return false;seen.add(ev.id);return true;}).sort((a,b)=>a.ts-b.ts);
  all.forEach(ev=>{if(ev.type==='workout'&&S.ath[ev.ath]){S.ath[ev.ath].xp+=ev.xp;S.history.push(ev);}});
  ACH.forEach(a=>{if(a.chk(S))S.ach.push(a.id);});S.ach=[...new Set(S.ach)];
}
async function fetchState(){
  const r=await fetch('/api/state',{headers:hdr()});
  if(r.status===401){NEED_CODE=true;throw new Error('auth');}
  const d=await r.json();
  try{localStorage.setItem(CACHE_KEY,JSON.stringify(d));}catch(e){}
  return d;
}
function sigOf(d){return((d&&d.events)?d.events.length:0)+'|'+(((d&&d.names)||[]).join(','));}
async function flush(){
  const p=pending();if(!p.length)return;
  try{const r=await fetch('/api/events',{method:'POST',headers:hdr(),body:JSON.stringify({events:p})});if(r.ok)setPending([]);}catch(e){}
}
async function load(){
  await flush();
  try{const d=await fetchState();NEED_CODE=false;rebuild(d);lastSig=sigOf(d);}
  catch(e){
    if(NEED_CODE)return;
    try{const c=JSON.parse(localStorage.getItem(CACHE_KEY)||'null');rebuild(c||{names:[],events:[]});}catch(_){S=fresh();}
  }
}
async function pushEvents(evs){const p=pending();p.push(...evs);setPending(p);await flush();}
async function setNames(n0,n1){try{await fetch('/api/names',{method:'POST',headers:hdr(),body:JSON.stringify({names:[n0,n1]})});}catch(e){}}
async function resetAll(){setPending([]);try{await fetch('/api/reset',{method:'POST',headers:hdr(),body:JSON.stringify({})});}catch(e){}}
async function deleteEvent(id){try{await fetch('/api/delete',{method:'POST',headers:hdr(),body:JSON.stringify({id})});}catch(e){}}
function renderGate(){
  document.querySelector('.topbar').style.visibility='hidden';
  document.getElementById('nav').style.display='none';
  const a=document.getElementById('app');
  a.innerHTML=`<div class="fade" style="padding-top:12vh;text-align:center">
    <div class="bebas" style="font-size:60px;color:var(--p1);line-height:.8">ВОЛНА</div>
    <div class="muted" style="margin-top:10px">Введите код комнаты,<br>чтобы открыть общий прогресс</div>
    <div class="card" style="margin-top:24px">
      <input id="codeIn" placeholder="код комнаты" autocapitalize="off" autocorrect="off" style="width:100%;background:var(--surf2);border:1px solid var(--line2);border-radius:12px;padding:14px;color:var(--tx);font-size:18px;font-weight:700;text-align:center;letter-spacing:.08em">
      <button class="btn go" id="codeGo" style="margin-top:14px">Войти</button>
      <div id="codeErr" style="font-size:12px;margin-top:10px;display:none;color:var(--p2t)">Неверный код, попробуйте ещё раз</div>
    </div></div>`;
  a.querySelector('#codeGo').onclick=async()=>{
    const v=a.querySelector('#codeIn').value.trim();
    localStorage.setItem(CODE_KEY,v);NEED_CODE=false;await load();
    if(NEED_CODE)a.querySelector('#codeErr').style.display='block';else render();
  };
}
function startSync(){
  setInterval(async()=>{
    if(!S||!S.setup||NEED_CODE)return;
    if(document.getElementById('live').classList.contains('on'))return;
    if(document.getElementById('scrim').classList.contains('on'))return;
    if(['home','prog','badge'].indexOf(TAB)<0)return;
    try{const d=await fetchState();const sig=sigOf(d);if(sig!==lastSig){lastSig=sig;rebuild(d);render();}}catch(e){}
  },6000);
}

/* ---------- helpers ---------- */
function dayKey(ts){const d=new Date(ts);return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function maxStreak(s){const days=[...new Set(s.history.map(h=>dayKey(h.ts)))].map(k=>{const[y,m,d]=k.split('-');return new Date(y,m-1,d).getTime();}).sort((a,b)=>a-b);if(!days.length)return 0;let best=1,cur=1;for(let i=1;i<days.length;i++){const gap=Math.round((days[i]-days[i-1])/864e5);if(gap===1)cur++;else if(gap>1)cur=1;best=Math.max(best,cur);}return best;}
function curStreak(s){const days=[...new Set(s.history.map(h=>dayKey(h.ts)))];if(!days.length)return 0;const set=new Set(days);let cur=0,d=new Date();for(let i=0;i<400;i++){if(set.has(dayKey(d.getTime())))cur++;else if(i>0)break;d.setDate(d.getDate()-1);}return cur;}
function weekStart(){const d=new Date();const day=(d.getDay()+6)%7;d.setHours(0,0,0,0);d.setDate(d.getDate()-day);return d.getTime();}
function weekXp(s,ai){return s.history.filter(h=>h.ts>=weekStart()&&h.ath===ai).reduce((a,h)=>a+h.xp,0);}
function weekCount(s,ai){return s.history.filter(h=>h.ts>=weekStart()&&h.ath===ai).length;}
function fmtTime(sec){sec=Math.max(0,Math.round(sec));const m=Math.floor(sec/60),s=sec%60;return m+':'+String(s).padStart(2,'0');}
function avatarInit(n){return n.trim().slice(0,2).toUpperCase();}

/* ---------- toast + confetti ---------- */
let tT;
function toast(msg,icon){const t=document.getElementById('toast');t.innerHTML=(icon||I.bolt)+'<span>'+msg+'</span>';t.classList.add('on');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('on'),2600);}
function confetti(){
  const c=document.createElement('div');c.className='confetti';document.body.appendChild(c);
  const cols=['#C7F751','#FF6B7E','#FFC247','#5BA8FF','#A98BFF'];
  for(let i=0;i<48;i++){const p=document.createElement('div');p.className='cpiece';p.style.left=Math.random()*100+'%';p.style.background=cols[i%cols.length];p.style.animationDuration=(1.6+Math.random()*1.4)+'s';p.style.animationDelay=(Math.random()*.4)+'s';p.style.transform='translateY(-20px)';c.appendChild(p);}
  setTimeout(()=>c.remove(),3200);
}

/* ====================== RENDER ====================== */
let TAB='home';
function render(){
  if(NEED_CODE){renderGate();return;}
  if(!S.setup){renderSetup();return;}
  document.querySelector('.topbar').style.visibility='visible';
  document.getElementById('nav').style.display='grid';
  renderNav();
  const a=document.getElementById('app');
  a.innerHTML='<div class="view on fade" id="view"></div>';
  const v=document.getElementById('view');
  if(TAB==='home')homeView(v);

/* ---------- RANDOM / GENERATOR / BUILDER ---------- */
function rnd(a,b,st){const v=a+Math.floor(Math.random()*((b-a)+1));return st?Math.round(v/st)*st:v;}
function pickBalanced(k){
  const byCat={};POOL.forEach(p=>{(byCat[p.cat]=byCat[p.cat]||[]).push(p);});
  const cats=Object.keys(byCat).sort(()=>Math.random()-.5);
  const out=[];let ci=0;
  while(out.length<k){const c=cats[ci%cats.length];const arr=byCat[c].filter(p=>!out.includes(p));if(arr.length)out.push(arr[Math.floor(Math.random()*arr.length)]);ci++;if(ci>40)break;}
  return out;
}
function genWod(){
  const formats=[
   {label:'AMRAP 18 мин',mode:'amrap',dur:1080,score:'rounds',k:3},
   {label:'AMRAP 12 мин',mode:'amrap',dur:720,score:'rounds',k:3},
   {label:'4 раунда на время',mode:'rounds',rounds:4,rest:60,score:'time',k:4},
   {label:'21-15-9 на время',mode:'rft',score:'time',k:3,ladder:true},
   {label:'EMOM 16 мин',mode:'emom',min:16,k:4},
   {label:'Интервалы 40/20 ×8',mode:'interval',work:40,rest:20,rounds:8,k:4},
   {label:'Tabata 20/10 ×8',mode:'interval',work:20,rest:10,rounds:8,k:3},
   {label:'Чиппер For Time',mode:'rft',score:'time',k:5,chip:true},
  ];
  const fmt=formats[Math.floor(Math.random()*formats.length)];
  const pool=pickBalanced(fmt.k);
  const ex=pool.map(p=>{
    if(fmt.ladder)return{n:p.n,a:'21·15·9'+(p.u!=='повт'?' '+p.u:'')};
    if(fmt.mode==='interval')return{n:p.n,a:fmt.work+' сек'};
    if(fmt.mode==='emom')return{n:p.n,a:rnd(p.lo,Math.round(p.hi*.7),p.st)+' '+p.u};
    if(fmt.chip)return{n:p.n,a:rnd(Math.round(p.hi*1.3),p.hi*2,p.st)+(p.u==='повт'?'':' '+p.u)};
    return{n:p.n,a:rnd(p.lo,p.hi,p.st)+(p.u==='повт'?'':' '+p.u)};
  });
  return{id:'gen',name:'СЛУЧАЙНЫЙ WOD',ic:I.dice,c:'p1',bg:'var(--p1d)',fg:'var(--p1t)',diff:1.2,gen:true,
    blocks:[
     {t:'Разминка',f:'8 мин',mode:'timer',dur:480,s:'Суставная + кардио-разгон + активация'},
     {t:fmt.label,f:fmt.label,mode:fmt.mode,dur:fmt.dur,rounds:fmt.rounds,rest:fmt.rest,min:fmt.min,work:fmt.work,score:fmt.score,s:'Сгенерировано из ваших движений',ex},
     {t:'Заминка',f:'7 мин',mode:'timer',dur:420,s:'Растяжка всё тело'}
    ],tip:'Каждый запуск — новая комбинация.'};
}

  <div class="card"><div class="chart">${counts.map((c,i)=>`<div class="c"><div class="bar" style="height:${Math.round(c/mx*100)}%;background:${c?'var(--p1)':'var(--surf3)'}"></div><div class="lab">${dn[days[i].getDay()===0?6:days[i].getDay()-1]}</div></div>`).join('')}</div></div>
  <div class="h-sec">История</div>
  ${total?`<div class="hist" id="hist">${h.slice().reverse().slice(0,40).map(x=>{const w=WK.find(z=>z.id===x.wid);const nm=w?w.name:(x.wname||'WOD');const A=S.ath[x.ath];return `<div class="hev p${x.ath+1}" style="position:relative;padding-right:34px"><button class="hdel" data-id="${x.id}">${I.trash}</button><span class="sc">+${x.xp} XP</span><div class="t">${nm}</div><div class="m">${A.name} · ${histDate(x.ts)}${x.result?' · '+x.result:''}</div></div>`;}).join('')}</div>`
   :`<div class="card" style="text-align:center"><div class="muted">Пока пусто. Запусти первый WOD — здесь появятся лог и графики.</div></div>`}`;
  v.querySelectorAll('.hdel').forEach(b=>b.onclick=async()=>{if(confirm('Удалить эту запись? XP за неё спишется.')){await deleteEvent(b.dataset.id);await load();render();toast('Запись удалена',I.check);}});
}
function histDate(ts){const d=new Date(ts);const days=['вс','пн','вт','ср','чт','пт','сб'];return days[d.getDay()]+' '+d.getDate()+'.'+String(d.getMonth()+1).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}

/* ---------- BADGES ---------- */
function badgeView(v){
  const got=new Set(S.ach);ACH.forEach(a=>{if(a.chk(S))got.add(a.id);});
  v.innerHTML=`
  <div class="h-sec" style="margin-top:14px">Награды · ${got.size}/${ACH.length}</div>
  <div class="badges">${ACH.map(a=>{const g=got.has(a.id);return `<div class="badge ${g?'got':'lock'}"><div class="bi">${g?a.ic:lockIc}</div><div class="bn">${a.n}</div></div>`;}).join('')}</div>
  <div class="h-sec">Рейтинг атлетов</div>
  ${[0,1].map(i=>{const s=lvlFromXp(S.ath[i].xp);const cnt=S.history.filter(h=>h.ath===i).length;return `<div class="card" style="margin-bottom:10px"><div class="row"><div class="avatar" style="background:${i===0?'var(--p1)':'var(--p2)'}">${avatarInit(S.ath[i].name)}</div><div style="flex:1"><div style="font-weight:800">${S.ath[i].name}</div><div class="dim" style="font-size:11px">${rankName(s.lvl)} · ур. ${s.lvl}</div></div><div style="text-align:right"><div class="bebas" style="font-size:24px;color:var(--gold)">${S.ath[i].xp}</div><div class="dim" style="font-size:10px">${cnt} трен.</div></div></div></div>`;}).join('')}`;
}
const lockIc='<svg viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="9" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M8 11V8a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="1.8"/></svg>';

/* ====================== LIVE ENGINE ====================== */
let LV=null;
function startWorkout(id){const w=WK.find(x=>x.id===id);if(w)startCustom(w);}
function startCustom(w){
  LV={w,bi:0,tid:null,running:false,phase:'idle',scores:{}};
  document.getElementById('live').classList.add('on');
  acquireWake();ensureAC();
  liveRender();
}
function exitLive(){if(LV&&LV.tid)clearInterval(LV.tid);LV=null;releaseWake();document.getElementById('live').classList.remove('on');render();}
function clearT(){if(LV.tid){clearInterval(LV.tid);LV.tid=null;}LV.running=false;}

function liveRender(){
  const L=document.getElementById('live');const w=LV.w;const b=w.blocks[LV.bi];
  const prog=w.blocks.map((_,i)=>`<i class="${i<LV.bi?'done':i===LV.bi?'now':''}" data-jb="${i}"></i>`).join('');
  L.innerHTML=`
   <div class="live-top">
     <button class="iconbtn" id="lvExit">${I.x}</button>
     <div style="text-align:center"><div class="bebas" style="font-size:22px;color:${w.fg||'var(--p1)'}">${w.name}</div><div class="dim" style="font-size:10px;letter-spacing:.1em">${LV.bi+1}/${w.blocks.length} · ${b.t.toUpperCase()}</div></div>
     <button class="iconbtn" id="lvSound">${SOUND?I.sound:I.mute}</button>
   </div>
   <div class="live-prog">${prog}</div>
   <div id="lvStage" style="flex:1;display:flex;flex-direction:column;justify-content:flex-start;overflow:auto;padding-top:6px"></div>`;
  L.querySelector('#lvExit').onclick=()=>{if(confirm('Выйти из тренировки? Прогресс не сохранится.'))exitLive();};
  L.querySelector('#lvSound').onclick=()=>{setSound(!SOUND);if(SOUND){ensureAC();beepTick();}L.querySelector('#lvSound').innerHTML=SOUND?I.sound:I.mute;};
  L.querySelectorAll('[data-jb]').forEach(s=>s.onclick=()=>{const i=+s.dataset.jb;if(i!==LV.bi){clearT();LV.bi=i;liveRender();}});
  stage(b);
}

function binfoHTML(b){
  const ex=(b.ex||[]).map(e=>`<div class="bexr"><span>${e.n}${e.no?` · ${e.no}`:''}</span><b>${e.a||''}</b></div>`).join('');
  return `<div class="binfo"><div class="binfo-h"><b>${b.t}</b><span>${b.f}</span></div>${b.s?`<div class="binfo-s">${b.s}</div>`:''}${ex?`<div class="bex">${ex}</div>`:''}</div>`;
}
function numBlock(){return `<div class="timer" id="lvNum">0:00</div><div class="tprog" id="lvProg"><i></i></div><div class="timersub" id="lvSub"></div>`;}
function setNum(t){const e=document.getElementById('lvNum');if(e)e.textContent=t;}
function setSub(t){const e=document.getElementById('lvSub');if(e)e.textContent=t;}
function setBar(frac){const e=document.getElementById('lvProg');if(e)e.firstElementChild.style.width=Math.max(0,Math.min(100,frac*100))+'%';}
function restClass(on){const e=document.getElementById('lvProg');if(e)e.classList.toggle('rest',on);}

function stage(b){
  clearT();LV.phase='idle';
  const st=document.getElementById('lvStage');
  const m=b.mode;
  if(m==='timer'||m==='amrap'){
    st.innerHTML=numBlock()+binfoHTML(b)+
      (m==='amrap'?`<div class="rcount" id="rc"><button id="rm">–</button><div class="rv"><span id="rv">0</span><small>РАУНДОВ</small></div><button id="rp">+</button></div>`:'')+
      `<div class="ctrls"><button class="btn go" id="lvPlay">${I.play} Старт</button>${m==='amrap'?`<button class="btn coral" id="lvFin">Финиш</button>`:`<button class="btn ghost" id="lvNext">${I.skip} Далее</button>`}</div>`;
    LV.sec=b.dur;LV.total=b.dur;LV.tally=0;
    setNum(fmtTime(LV.sec));setBar(1);setSub(m==='amrap'?'AMRAP · нажми старт':'таймер · нажми старт');
    if(m==='amrap'){const rv=st.querySelector('#rv');st.querySelector('#rp').onclick=()=>{LV.tally++;rv.textContent=LV.tally;beepTick();vibrate(40);};st.querySelector('#rm').onclick=()=>{if(LV.tally>0)LV.tally--;rv.textContent=LV.tally;};st.querySelector('#lvFin').onclick=()=>{clearT();openScore(b);};}
    wirePlay(b);wireNext(st);
  }
  else if(m==='emom'){
    st.innerHTML=numBlock()+binfoHTML(b)+`<div class="ctrls"><button class="btn go" id="lvPlay">${I.play} Старт</button><button class="btn ghost" id="lvNext">${I.skip} Далее</button></div>`;
    LV.sec=b.min*60;LV.total=LV.sec;setNum(fmtTime(LV.sec));setBar(1);setSub('EMOM · нажми старт');
    wirePlay(b);wireNext(st);
  }
  else if(m==='interval'){
    st.innerHTML=numBlock()+binfoHTML(b)+`<div class="ctrls"><button class="btn go" id="lvPlay">${I.play} Старт</button><button class="btn ghost" id="lvNext">${I.skip} Далее</button></div>`;
    LV.round=1;LV.sec=b.work;LV.total=b.work;LV.work=true;setNum(LV.sec);setBar(1);setSub('нажми старт · '+b.rounds+' раундов');
    wirePlay(b);wireNext(st);
  }
  else if(m==='rounds'){
    st.innerHTML=numBlock()+binfoHTML(b)+
      `<div class="rcount"><button id="rm">–</button><div class="rv"><span id="rv">1</span><small>РАУНД${b.rounds?' / '+b.rounds:''}</small></div><button id="rp">+</button></div>
       <div class="ctrls"><button class="btn go" id="lvPlay">${I.play} Старт</button><button class="btn ghost" id="lvRound">Раунд закрыт</button></div>
       <div class="ctrls" style="margin-top:8px"><button class="btn coral" id="lvFin">Финиш блока</button><button class="btn ghost" id="lvNext">${I.skip} Далее</button></div>`;
    LV.sec=0;LV.round=1;LV.resting=false;
    setNum('0:00');setBar(0);setSub(b.rest?('раунд 1'+(b.rounds?' / '+b.rounds:'')+' · отдых '+b.rest+'с'):'на время');
    const rv=st.querySelector('#rv');
    st.querySelector('#rp').onclick=()=>{LV.round++;rv.textContent=LV.round;};
    st.querySelector('#rm').onclick=()=>{if(LV.round>1)LV.round--;rv.textContent=LV.round;};
    st.querySelector('#lvRound').onclick=()=>roundClosed(b,rv);
    st.querySelector('#lvFin').onclick=()=>{clearT();openScore(b);};
    wirePlay(b);wireNext(st);
  }
  else if(m==='rft'){
    st.innerHTML=numBlock()+binfoHTML(b)+`<div class="ctrls"><button class="btn go" id="lvPlay">${I.play} Старт</button><button class="btn coral" id="lvFin">Финиш</button></div><div class="ctrls" style="margin-top:8px"><button class="btn ghost" id="lvNext">${I.skip} Далее</button></div>`;
    LV.sec=0;setNum('0:00');setBar(0);setSub('на время · нажми старт');
    st.querySelector('#lvFin').onclick=()=>{clearT();openScore(b);};
    wirePlay(b);wireNext(st);
  }
  else if(m==='deathby'){
    st.innerHTML=numBlock()+binfoHTML(b)+`<div class="ctrls"><button class="btn go" id="lvPlay">${I.play} Старт</button><button class="btn coral" id="lvFail">Не успел</button></div><div class="ctrls" style="margin-top:8px"><button class="btn ghost" id="lvNext">${I.skip} Далее</button></div>`;
    LV.minute=1;LV.target=b.start;LV.sec=60;LV.total=60;
    setNum('1:00');setBar(1);setSub('минута 1 · '+b.start+' '+b.move);
    st.querySelector('#lvFail').onclick=()=>{clearT();LV.scores[b.t]='дошёл до '+LV.target+' ('+(LV.minute)+' мин)';beepDone();nextBlock();};
    wirePlay(b);wireNext(st);
  }
  else if(m==='strength'){
    st.innerHTML=`<div class="timer" id="lvNum" style="font-size:84px">${b.sets}</div><div class="timersub" id="lvSub">подходов по ${b.reps}</div>`+binfoHTML(b)+
      `<div class="scoreinput" style="margin-top:12px"><input id="wkg" inputmode="decimal" placeholder="рабочий вес, кг (необяз.)"></div>
       <div class="rcount"><button id="rm">–</button><div class="rv"><span id="rv">1</span><small>ПОДХОД / ${b.sets}</small></div><button id="rp">+</button></div>
       <div class="ctrls"><button class="btn go" id="lvSet">Подход готов · отдых ${b.rest}с</button></div>
       <div class="ctrls" style="margin-top:8px"><button class="btn ghost" id="lvNext">${I.skip} Далее</button></div>`;
    LV.set=1;const rv=st.querySelector('#rv');
    st.querySelector('#rp').onclick=()=>{if(LV.set<b.sets){LV.set++;rv.textContent=LV.set;}};
    st.querySelector('#rm').onclick=()=>{if(LV.set>1){LV.set--;rv.textContent=LV.set;}};
    st.querySelector('#lvSet').onclick=()=>strengthSet(b,rv);
    wireNext(st);
  }
}

function wirePlay(b){const pb=document.getElementById('lvPlay');if(pb)pb.onclick=()=>togglePlay(b);}
function wireNext(st){const nx=st.querySelector('#lvNext');if(nx)nx.onclick=()=>{clearT();nextBlock();};}

function togglePlay(b){
  const pb=document.getElementById('lvPlay');
  if(LV.running||LV.phase==='lead'){clearT();LV.phase='paused';if(pb)pb.innerHTML=I.play+' Продолжить';return;}
  ensureAC();
  withLead(()=>{ if(pb)pb.innerHTML=I.pause+' Пауза'; runMode(b); });
}
function withLead(go){
  LV.phase='lead';let n=3;setSub('ПРИГОТОВЬСЯ');setNum(n);beepCue(3);vibrate(90);
  LV.tid=setInterval(()=>{n--;if(n>0){setNum(n);beepCue(n);vibrate(90);}else{clearInterval(LV.tid);LV.tid=null;beepGo();vibrate([0,160]);go();}},1000);
}
function runMode(b){
  LV.running=true;LV.phase='work';
  if(b.mode==='timer'||b.mode==='amrap')runCountdown(b);
  else if(b.mode==='emom')runEmom(b);
  else if(b.mode==='interval')runInterval(b);
  else if(b.mode==='rounds'||b.mode==='rft')runCountup(b);
  else if(b.mode==='deathby')runDeathby(b);
}

function runCountdown(b){
  setSub(b.mode==='amrap'?'AMRAP · осталось':'таймер');setNum(fmtTime(LV.sec));
  LV.tid=setInterval(()=>{
    LV.sec--;setNum(fmtTime(LV.sec));setBar(LV.sec/LV.total);
    if(LV.sec<=3&&LV.sec>0){beepTick();vibrate(60);}
    if(LV.sec<=0){clearT();beepDone();vibrate([0,200,80,200]);
      if(b.mode==='amrap'){openScore(b);}else{toast('Блок завершён',I.check);nextBlock();}}
  },1000);
}
function runEmom(b){
  LV.tid=setInterval(()=>{
    LV.sec--;setNum(fmtTime(LV.sec));setBar(LV.sec/LV.total);
    const elapsed=b.min*60-LV.sec;const inMin=elapsed%60;const curMin=Math.floor(elapsed/60)+1;
    if(inMin===0){beepGo();vibrate([0,120]);setSub('EMOM · минута '+Math.min(curMin,b.min)+' / '+b.min);}
    else{if(setSubInit())setSub('EMOM · минута '+Math.min(curMin,b.min)+' / '+b.min);if(60-inMin<=3){beepTick();vibrate(50);}}
    if(LV.sec<=0){clearT();beepDone();vibrate([0,200,80,200]);toast('EMOM завершён',I.check);nextBlock();}
  },1000);
}
let _subFlag=true;function setSubInit(){if(_subFlag){_subFlag=false;return true;}return false;}
function runInterval(b){
  applyInterval(b);
  LV.tid=setInterval(()=>{
    LV.sec--;setNum(LV.sec);setBar(LV.sec/LV.total);
    if(LV.sec<=3&&LV.sec>0){beepTick();vibrate(50);}
    if(LV.sec<=0){
      if(LV.work){ // work -> rest (or next round if rest 0)
        if(b.rest>0){LV.work=false;LV.sec=b.rest;LV.total=b.rest;restClass(true);beepRest();vibrate([0,140]);setSub('ОТДЫХ · след. раунд '+(LV.round+1<=b.rounds?LV.round+1:LV.round)+'/'+b.rounds);}
        else{LV.round++;if(LV.round>b.rounds){finishInterval(b);return;}LV.sec=b.work;LV.total=b.work;beepGo();vibrate([0,120]);intervalWorkSub(b);}
      } else { // rest -> next work
        LV.round++;if(LV.round>b.rounds){finishInterval(b);return;}
        LV.work=true;LV.sec=b.work;LV.total=b.work;restClass(false);beepGo();vibrate([0,120]);intervalWorkSub(b);
      }
    }
  },1000);
}
function applyInterval(b){restClass(false);intervalWorkSub(b);}
function intervalWorkSub(b){const mv=(b.ex&&b.ex.length)?b.ex[(LV.round-1)%b.ex.length].n:'';setSub('РАБОТА · раунд '+LV.round+'/'+b.rounds+(mv?' · '+mv:''));}
function finishInterval(b){clearT();beepDone();vibrate([0,200,80,200]);toast('Интервалы завершены',I.check);nextBlock();}
function runCountup(b){
  setSub(b.mode==='rounds'?('раунд '+LV.round+(b.rounds?' / '+b.rounds:'')):'на время');setNum(fmtTime(LV.sec));
  LV.tid=setInterval(()=>{LV.sec++;setNum(fmtTime(LV.sec));},1000);
}
function runDeathby(b){
  setSub('минута '+LV.minute+' · '+LV.target+' '+b.move);setNum('1:00');
  LV.tid=setInterval(()=>{
    LV.sec--;setNum(fmtTime(LV.sec));setBar(LV.sec/60);
    if(LV.sec<=3&&LV.sec>0){beepTick();vibrate(50);}
    if(LV.sec<=0){LV.minute++;LV.target+=b.step;LV.sec=60;setBar(1);beepGo();vibrate([0,140]);setSub('минута '+LV.minute+' · '+LV.target+' '+b.move);
      if(b.cap&&LV.target>b.cap){clearT();beepDone();LV.scores[b.t]='дошёл до '+b.cap+'+';toast('Cap! Зверь.',I.skull);nextBlock();}}
  },1000);
}

/* rounds: round closed -> programmed rest countdown */
function roundClosed(b,rv){
  if(LV.resting)return;
  if(!LV.running){toast('Сначала запусти таймер',I.bolt);return;}
  if(b.rounds&&LV.round>=b.rounds){clearT();openScore(b);return;}
  LV.round++;rv.textContent=LV.round;
  if(b.rest>0){
    LV.resting=true;clearInterval(LV.tid);
    let r=b.rest;restClass(true);setSub('ОТДЫХ');setNum(fmtTime(r));beepRest();vibrate([0,140]);
    LV.tid=setInterval(()=>{
      r--;setNum(fmtTime(r));setBar(r/b.rest);
      if(r<=3&&r>0){beepTick();vibrate(50);}
      if(r<=0){clearInterval(LV.tid);LV.resting=false;restClass(false);beepGo();vibrate([0,140]);setSub('раунд '+LV.round+(b.rounds?' / '+b.rounds:''));runCountup(b);}
    },1000);
  } else { setSub('раунд '+LV.round+(b.rounds?' / '+b.rounds:'')); }
}

/* strength: set done -> rest countdown */
function strengthSet(b,rv){
  if(LV.resting)return;
  if(LV.set>=b.sets){const kg=document.getElementById('wkg').value.trim();LV.scores[b.t]=b.move+' '+b.sets+'×'+b.reps+(kg?' @'+kg+'кг':'');beepDone();toast('Силовая закрыта',I.check);nextBlock();return;}
  const kgEl=document.getElementById('wkg');
  LV.set++;rv.textContent=LV.set;
  LV.resting=true;let r=b.rest;
  const num=document.getElementById('lvNum');num.style.fontSize='84px';setNum(fmtTime(r));setSub('ОТДЫХ · след. подход '+LV.set+'/'+b.sets);beepRest();vibrate([0,140]);
  LV.tid=setInterval(()=>{r--;setNum(fmtTime(r));if(r<=3&&r>0){beepTick();vibrate(50);}if(r<=0){clearInterval(LV.tid);LV.tid=null;LV.resting=false;beepGo();vibrate([0,140]);setNum(b.sets-LV.set+1);setSub('подход '+LV.set+'/'+b.sets+' по '+b.reps);}},1000);
}

function nextBlock(){_subFlag=true;if(LV.bi<LV.w.blocks.length-1){LV.bi++;liveRender();}else finishWorkout();}

/* score screen — manual round / time tally */
function openScore(b){
  _subFlag=true;
  const st=document.getElementById('lvStage');
  if(b.score==='time'){
    const t=fmtTime(LV.sec);
    let extra='';
    if(b.mode==='rounds'){extra=`<div class="rcount"><button id="rm">–</button><div class="rv"><span id="rv">${LV.round}</span><small>РАУНДОВ ВСЕГО</small></div><button id="rp">+</button></div>`;}
    st.innerHTML=`<div style="text-align:center;padding-top:20px">${binfoHTML(b)}<div class="timersub" style="margin-top:14px">Твоё время</div><div class="timer" style="font-size:74px">${t}</div>${extra}<button class="btn go" id="saveSc" style="margin-top:14px">${I.check} Засчитать</button></div>`;
    let rounds=LV.round;
    if(b.mode==='rounds'){const rv=st.querySelector('#rv');st.querySelector('#rp').onclick=()=>{rounds++;rv.textContent=rounds;};st.querySelector('#rm').onclick=()=>{if(rounds>0)rounds--;rv.textContent=rounds;};}
    st.querySelector('#saveSc').onclick=()=>{LV.scores[b.t]=t+(b.mode==='rounds'?(' · '+rounds+' р.'):'');nextBlock();};
  } else { // rounds tally (amrap etc.)
    let val=LV.tally||0;
    st.innerHTML=`<div style="text-align:center;padding-top:20px">${binfoHTML(b)}<div class="timersub" style="margin-top:14px">Сколько раундов закрыли?</div>
      <div class="rcount" style="margin-top:8px"><button id="rm" style="width:54px;height:54px;font-size:30px">–</button><div class="rv" style="font-size:60px"><span id="rv">${val}</span></div><button id="rp" style="width:54px;height:54px;font-size:30px">+</button></div>
      <div class="muted" style="font-size:12px">Остаток повторов можно дописать мысленно — считаем полные раунды</div>
      <button class="btn go" id="saveSc" style="margin-top:18px">${I.check} Засчитать</button></div>`;
    const rv=st.querySelector('#rv');
    st.querySelector('#rp').onclick=()=>{val++;rv.textContent=val;beepTick();};
    st.querySelector('#rm').onclick=()=>{if(val>0)val--;rv.textContent=val;};
    st.querySelector('#saveSc').onclick=()=>{LV.scores[b.t]=val+' раундов';nextBlock();};
  }
}

/* finish */
function finishWorkout(){
  const w=LV.w;
  let durMin=100;
  if(!w.gen&&w.tags){const tg=w.tags.find(t=>/мин/.test(t));if(tg){const m=tg.match(/\d+/);if(m)durMin=parseInt(m[0]);}}
  const baseXp=Math.round((w.gen?60:Math.min(durMin,120))*(w.diff||1.2)+40);
  const scoreStr=Object.values(LV.scores).filter(Boolean).join(' · ');
  document.querySelector('.live-prog').innerHTML=LV.w.blocks.map(()=>'<i class="done"></i>').join('');
  const st=document.getElementById('lvStage');
  st.innerHTML=`<div class="lvlup fade" style="padding-top:14px">
     <div style="color:var(--gold)">${I.trophy}</div>
     <div class="big bebas">WOD ЗАКРЫТ</div>
     <div class="muted" style="margin-top:4px">${w.name}${scoreStr?' · '+scoreStr:''}</div>
     <div class="pill" style="background:rgba(255,194,71,.18);color:var(--gold);margin-top:14px;font-size:14px">${I.bolt} +${baseXp} XP</div>
     <div class="timersub" style="margin-top:24px">Кто выполнил?</div>
     <div class="whochip" id="whochip">
       <button data-i="0">${avatarInit(S.ath[0].name)} · ${S.ath[0].name}</button>
       <button data-i="1">${avatarInit(S.ath[1].name)} · ${S.ath[1].name}</button>
     </div>
     <div class="whochip" style="margin-top:8px"><button data-i="2" style="flex:1">${I.users} Оба (дуэт)</button></div>
     <button class="btn ghost" id="lvDone" style="margin-top:18px;opacity:.5" disabled>Выбери атлета</button>
   </div>`;
  confetti();beepDone();
  let who=null;
  st.querySelectorAll('.whochip button').forEach(btn=>btn.onclick=()=>{
    st.querySelectorAll('.whochip button').forEach(x=>x.className='');
    who=parseInt(btn.dataset.i);btn.classList.add(who===1?'on2':'on1');
    const d=st.querySelector('#lvDone');d.disabled=false;d.style.opacity=1;d.innerHTML=I.check+' Сохранить результат';beepTick();
  });
  st.querySelector('#lvDone').onclick=async()=>{
    if(who===null)return;
    const ts=Date.now();const targets=who===2?[0,1]:[who];
    const before=[lvlFromXp(S.ath[0].xp).lvl,lvlFromXp(S.ath[1].xp).lvl];
    const evs=targets.map(i=>({id:ts+'-'+i+'-'+Math.random().toString(36).slice(2,7),ts,type:'workout',wid:w.gen?(w.id||'gen'):w.id,wname:w.name,ath:i,xp:baseXp,result:scoreStr}));
    evs.forEach(ev=>{S.ath[ev.ath].xp+=ev.xp;S.history.push(ev);});
    const prev=new Set(S.ach);ACH.forEach(a=>{if(a.chk(S))S.ach.push(a.id);});S.ach=[...new Set(S.ach)];
    const newBadges=S.ach.filter(x=>!prev.has(x));
    await pushEvents(evs);
    const after=[lvlFromXp(S.ath[0].xp).lvl,lvlFromXp(S.ath[1].xp).lvl];
    const lvUp=targets.find(i=>after[i]>before[i]);
    exitLive();
    if(lvUp!==undefined)setTimeout(()=>toast(S.ath[lvUp].name+' → уровень '+after[lvUp]+'! '+rankName(after[lvUp]),I.crown),300);
    else setTimeout(()=>toast('+'+baseXp+' XP записано',I.check),300);
    if(newBadges.length)setTimeout(()=>{const a=ACH.find(x=>x.id===newBadges[0]);toast('Награда: '+a.n,I.medal);},lvUp!==undefined?2800:2600);
  };
}

/* ---------- settings ---------- */
document.getElementById('settingsBtn').onclick=()=>{
  const sc=document.getElementById('scrim'),sh=document.getElementById('sheet');
  sh.innerHTML=`<div class="row" style="justify-content:space-between"><div class="bebas" style="font-size:26px">Настройки</div><button class="iconbtn" id="clx">${I.x}</button></div>
   <div class="h-sec" style="margin-top:18px">Звук и вибро</div>
   <div class="tgl"><div class="lab">Звук таймера<small>отсчёт 3-2-1, биперы, конец</small></div><div class="sw ${SOUND?'on':''}" id="swSound"><i></i></div></div>
   <div class="tgl"><div class="lab">Вибрация<small>отклик на телефоне</small></div><div class="sw ${HAPTIC?'on':''}" id="swHap"><i></i></div></div>
   <div class="h-sec">Имена атлетов</div>
   <input id="sn1" value="${S.ath[0].name}" style="width:100%;margin-bottom:10px;background:var(--surf);border:1px solid var(--line2);border-radius:12px;padding:12px;color:var(--tx);font-weight:700">
   <input id="sn2" value="${S.ath[1].name}" style="width:100%;background:var(--surf);border:1px solid var(--line2);border-radius:12px;padding:12px;color:var(--tx);font-weight:700">
   <button class="btn go" id="ssave" style="margin-top:16px">${I.check} Сохранить имена</button>
   <button class="btn ghost" id="sreset" style="margin-top:10px;color:var(--p2t)">Сбросить весь прогресс</button>`;
  sc.classList.add('on');
  sh.querySelector('#clx').onclick=()=>sc.classList.remove('on');
  sc.onclick=e=>{if(e.target===sc)sc.classList.remove('on');};
  sh.querySelector('#swSound').onclick=function(){setSound(!SOUND);this.classList.toggle('on',SOUND);if(SOUND){ensureAC();beepTick();}};
  sh.querySelector('#swHap').onclick=function(){setHaptic(!HAPTIC);this.classList.toggle('on',HAPTIC);if(HAPTIC)vibrate(60);};
  sh.querySelector('#ssave').onclick=async()=>{S.ath[0].name=(sh.querySelector('#sn1').value||'Атлет 1').slice(0,14);S.ath[1].name=(sh.querySelector('#sn2').value||'Атлет 2').slice(0,14);await setNames(S.ath[0].name,S.ath[1].name);sc.classList.remove('on');render();toast('Сохранено',I.check);};
  sh.querySelector('#sreset').onclick=async()=>{if(confirm('Удалить весь прогресс, XP и историю у ОБОИХ? Это необратимо.')){await resetAll();await load();sc.classList.remove('on');render();}};
};

/* ---------- boot ---------- */
(async function(){await load();render();startSync();})();

</script>
</body>
</html>
