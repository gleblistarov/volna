<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ВОЛНА">
<meta name="theme-color" content="#0C0D10">
<title>ВОЛНА — функциональный тренинг как игра</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0C0D10; --bg2:#131519; --surf:#171A20; --surf2:#1E222A; --surf3:#262B35;
  --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.13);
  --tx:#F2F4F7; --tx2:#9AA1AD; --tx3:#646B78;
  --p1:#C7F751; --p1d:#1d2410; --p1t:#dcff7a;      /* athlete 1 — lime */
  --p2:#FF6B7E; --p2d:#2a1418; --p2t:#ff97a5;      /* athlete 2 — coral */
  --gold:#FFC247; --blue:#5BA8FF; --vio:#A98BFF;
  --r:14px; --r2:20px;
  --safe: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--tx);font-family:'Manrope',system-ui,sans-serif;overscroll-behavior-y:none}
body{max-width:760px;margin:0 auto;min-height:100vh;position:relative}
.bebas{font-family:'Bebas Neue',sans-serif;letter-spacing:.02em;font-weight:400}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit}
::-webkit-scrollbar{width:0;height:0}

/* layout */
#app{padding:0 16px calc(96px + var(--safe))}
.topbar{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,var(--bg) 70%,transparent);padding:16px 16px 10px;display:flex;align-items:center;justify-content:space-between;max-width:760px;margin:0 auto}
.logo{display:flex;align-items:center;gap:10px}
.logo .mark{width:34px;height:34px;border-radius:10px;background:var(--p1);display:flex;align-items:center;justify-content:center;color:#0C0D10}
.logo .mark svg{width:20px;height:20px}
.logo .name{font-size:30px;line-height:.8;color:var(--tx)}
.logo .sub{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--tx3);margin-top:3px}

/* bottom nav */
.nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:760px;z-index:40;
  background:rgba(13,14,17,.86);backdrop-filter:blur(18px);border-top:1px solid var(--line);
  display:grid;grid-template-columns:repeat(5,1fr);padding:8px 8px calc(8px + var(--safe))}
.nav button{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 0;color:var(--tx3);border-radius:12px;transition:color .15s}
.nav button svg{width:23px;height:23px}
.nav button span{font-size:10px;font-weight:600;letter-spacing:.01em}
.nav button.on{color:var(--tx)}
.nav button.on.start{color:var(--bg)}
.nav .start{position:relative}
.nav .start .fab{width:50px;height:50px;border-radius:16px;background:var(--p1);display:flex;align-items:center;justify-content:center;color:#0C0D10;margin-top:-22px;box-shadow:0 8px 24px rgba(199,247,81,.35);transition:transform .15s}
.nav .start:active .fab{transform:scale(.92)}
.nav .start svg{width:26px;height:26px}
.nav .start span{margin-top:2px;color:var(--tx2)}

/* generic */
.card{background:var(--surf);border:1px solid var(--line);border-radius:var(--r2);padding:18px}
.row{display:flex;align-items:center;gap:12px}
.muted{color:var(--tx2)}.dim{color:var(--tx3)}
.h-sec{font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--tx3);margin:26px 2px 12px}
.pill{font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px;letter-spacing:.04em;text-transform:uppercase;display:inline-flex;align-items:center;gap:4px}
.fade{animation:fade .4s ease both}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.view{display:none}.view.on{display:block}

/* hero athlete cards */
.athletes{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px}
.acard{border-radius:var(--r2);padding:16px 14px;position:relative;overflow:hidden;border:1px solid var(--line);background:var(--surf)}
.acard.a1{box-shadow:inset 0 0 0 1px rgba(199,247,81,.18)}
.acard.a2{box-shadow:inset 0 0 0 1px rgba(255,107,126,.18)}
.acard .glow{position:absolute;inset:0;opacity:.10;pointer-events:none}
.acard.a1 .glow{background:radial-gradient(120px 80px at 80% 0%,var(--p1),transparent)}
.acard.a2 .glow{background:radial-gradient(120px 80px at 80% 0%,var(--p2),transparent)}
.avatar{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:24px;color:#0C0D10}
.a1 .avatar{background:var(--p1)} .a2 .avatar{background:var(--p2)}
.lvl{font-family:'Bebas Neue';font-size:40px;line-height:.8}
.a1 .lvl{color:var(--p1t)} .a2 .lvl{color:var(--p2t)}
.rankname{font-size:11px;font-weight:700;letter-spacing:.04em}
.xpbar{height:7px;border-radius:99px;background:var(--surf3);overflow:hidden;margin-top:10px}
.xpbar i{display:block;height:100%;border-radius:99px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.a1 .xpbar i{background:var(--p1)} .a2 .xpbar i{background:var(--p2)}
.statline{display:flex;justify-content:space-between;margin-top:12px;font-size:12px}
.statline b{font-family:'Bebas Neue';font-size:22px;display:block;line-height:.9;font-weight:400}
.a1 .statline b{color:var(--tx)} .a2 .statline b{color:var(--tx)}

/* versus */
.vs{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-top:8px}
.vsbar{height:30px;border-radius:9px;display:flex;overflow:hidden;background:var(--surf3)}
.vsbar .l{background:var(--p1)} .vsbar .r{background:var(--p2)}
.vs .mid{font-family:'Bebas Neue';font-size:18px;color:var(--tx3);padding:0 4px}

/* workout list */
.wod{border:1px solid var(--line);border-radius:var(--r2);background:var(--surf);overflow:hidden;margin-bottom:12px;transition:border-color .15s}
.wod:active{border-color:var(--line2)}
.wod .top{display:flex;gap:13px;padding:15px;align-items:center}
.wod .ic{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wod .ic svg{width:25px;height:25px}
.wod h3{margin:0;font-size:17px;font-weight:800}
.wod .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
.tag{font-size:10px;font-weight:700;letter-spacing:.03em;color:var(--tx2);background:var(--surf2);padding:3px 8px;border-radius:7px;text-transform:uppercase}
.chev{color:var(--tx3);flex-shrink:0;transition:transform .2s}
.chev.open{transform:rotate(180deg)}
.wbody{display:none;border-top:1px solid var(--line);padding:6px 15px 15px}
.wbody.open{display:block}
.blk{margin-top:13px}
.blk .bh{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.blk .bt{font-size:14px;font-weight:800}
.blk .bf{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--tx3)}
.blk .bs{font-size:12px;color:var(--tx2);margin:2px 0 8px}
.ex{display:flex;gap:9px;padding:7px 0;border-top:1px dashed var(--line)}
.ex .d{width:5px;height:5px;border-radius:9px;background:var(--tx3);margin-top:8px;flex-shrink:0}
.ex .n{flex:1;font-size:13px;font-weight:600}
.ex .n small{display:block;font-weight:500;color:var(--tx2);font-size:11px;margin-top:1px}
.ex .a{font-size:12px;color:var(--tx2);white-space:nowrap;font-weight:700}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:14px;font-weight:800;font-size:14px;transition:transform .12s,opacity .15s}
.btn:active{transform:scale(.98)}
.btn.go{background:var(--p1);color:#0C0D10;margin-top:14px}
.btn.go svg{width:18px;height:18px}
.btn.ghost{background:var(--surf2);color:var(--tx);border:1px solid var(--line)}
.btn.coral{background:var(--p2);color:#0C0D10}

/* segmented */
.seg{display:flex;background:var(--surf);border:1px solid var(--line);border-radius:13px;padding:4px;gap:4px;margin-top:4px}
.seg button{flex:1;padding:9px;border-radius:9px;font-size:13px;font-weight:700;color:var(--tx2);transition:.15s}
.seg button.on{background:var(--surf3);color:var(--tx)}

/* glossary move */
.move{border:1px solid var(--line);border-radius:var(--r);background:var(--surf);padding:13px 14px;margin-bottom:9px}
.move h4{margin:0 0 3px;font-size:14px;font-weight:800;display:flex;align-items:center;gap:8px}
.move .mu{font-size:11px;font-weight:700;color:var(--p1t);text-transform:uppercase;letter-spacing:.04em}
.move p{margin:5px 0 0;font-size:12.5px;color:var(--tx2);line-height:1.55}
.move .sv{margin-top:7px;font-size:12px;color:var(--tx)}
.move .sv b{color:var(--vio);font-weight:700}

/* progress */
.stats4{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.sbox{background:var(--surf);border:1px solid var(--line);border-radius:var(--r);padding:14px}
.sbox .v{font-family:'Bebas Neue';font-size:34px;line-height:.85}
.sbox .k{font-size:11px;color:var(--tx2);font-weight:600;margin-top:3px}
.chart{display:flex;align-items:flex-end;gap:5px;height:120px;margin-top:6px}
.chart .c{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;justify-content:flex-end;height:100%}
.chart .bar{width:100%;border-radius:6px 6px 3px 3px;min-height:3px;transition:height .5s}
.chart .lab{font-size:9px;color:var(--tx3);font-weight:600}
.hist{border-left:2px solid var(--line);margin-left:6px;padding-left:16px}
.hev{position:relative;padding:10px 0;border-bottom:1px solid var(--line)}
.hev::before{content:'';position:absolute;left:-23px;top:15px;width:9px;height:9px;border-radius:9px;background:var(--surf3);border:2px solid var(--bg)}
.hev.p1::before{background:var(--p1)} .hev.p2::before{background:var(--p2)}
.hev .t{font-size:14px;font-weight:700}
.hev .m{font-size:11px;color:var(--tx2);margin-top:2px}
.hev .sc{font-family:'Bebas Neue';font-size:16px;float:right;color:var(--gold)}

/* badges */
.badges{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.badge{aspect-ratio:1;border:1px solid var(--line);border-radius:var(--r);background:var(--surf);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8px;gap:5px;position:relative;overflow:hidden}
.badge.lock{opacity:.4}
.badge .bi{width:38px;height:38px;display:flex;align-items:center;justify-content:center}
.badge .bi svg{width:30px;height:30px}
.badge .bn{font-size:10px;font-weight:700;line-height:1.15}
.badge.got{box-shadow:inset 0 0 0 1px rgba(255,194,71,.4)}
.badge.got .bi{color:var(--gold)}
.badge.lock .bi{color:var(--tx3)}

/* roulette */
.roul{height:200px;border:1px solid var(--line);border-radius:var(--r2);background:var(--surf);overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}
.roul .needle{position:absolute;left:0;right:0;top:50%;height:64px;transform:translateY(-50%);border-top:2px solid var(--p1);border-bottom:2px solid var(--p1);pointer-events:none;z-index:3}
.reel{position:absolute;width:100%}
.ritem{height:64px;display:flex;align-items:center;justify-content:center;gap:10px;font-family:'Bebas Neue';font-size:30px;color:var(--tx2)}
.ritem .ri{width:34px;height:34px;display:flex;align-items:center;justify-content:center}

/* modal / live */
.scrim{position:fixed;inset:0;z-index:60;background:rgba(8,9,11,.8);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:16px}
.scrim.on{display:flex}
.sheet{background:var(--bg2);border:1px solid var(--line2);border-radius:24px;width:100%;max-width:520px;max-height:92vh;overflow:auto;padding:22px}
.toast{position:fixed;left:50%;bottom:calc(110px + var(--safe));transform:translateX(-50%) translateY(20px);z-index:80;background:var(--surf3);border:1px solid var(--line2);border-radius:14px;padding:12px 18px;font-weight:700;font-size:14px;opacity:0;transition:.3s;pointer-events:none;display:flex;align-items:center;gap:9px;max-width:90%}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast svg{width:20px;height:20px;color:var(--gold);flex-shrink:0}

/* live screen */
#live{position:fixed;inset:0;z-index:70;background:var(--bg);max-width:760px;margin:0 auto;display:none;flex-direction:column;padding:calc(16px + var(--safe)) 18px calc(20px + var(--safe))}
#live.on{display:flex}
.live-top{display:flex;align-items:center;justify-content:space-between}
.iconbtn{width:40px;height:40px;border-radius:12px;background:var(--surf2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center}
.iconbtn svg{width:20px;height:20px}
.live-prog{display:flex;gap:5px;margin:16px 0 4px}
.live-prog i{flex:1;height:4px;border-radius:9px;background:var(--surf3)}
.live-prog i.done{background:var(--tx2)} .live-prog i.now{background:var(--p1)}
.timer{font-family:'Bebas Neue';font-size:120px;line-height:.8;text-align:center;font-variant-numeric:tabular-nums;letter-spacing:.01em}
.timersub{text-align:center;font-size:13px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--tx3)}
.ring{width:230px;height:230px;margin:0 auto;position:relative}
.ring svg{transform:rotate(-90deg)}
.ring .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ctrls{display:flex;gap:10px;margin-top:8px}
.ctrls .btn{flex:1}
.exlist{flex:1;overflow:auto;margin-top:4px}
.exli{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--line);align-items:center}
.exli .num{width:24px;height:24px;border-radius:8px;background:var(--surf3);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:14px;color:var(--tx2);flex-shrink:0}
.exli .nm{flex:1;font-size:15px;font-weight:700}
.exli .nm small{display:block;font-weight:500;font-size:12px;color:var(--tx2)}
.exli .rp{font-family:'Bebas Neue';font-size:22px;color:var(--p1t)}
.scoreinput{display:flex;gap:8px;align-items:center;margin-top:8px}
.scoreinput input{flex:1;background:var(--surf);border:1px solid var(--line2);border-radius:12px;padding:13px;color:var(--tx);font-size:18px;font-weight:700;text-align:center}
.stepper{display:flex;align-items:center;gap:14px;justify-content:center;margin:18px 0}
.stepper button{width:54px;height:54px;border-radius:16px;background:var(--surf2);border:1px solid var(--line2);font-family:'Bebas Neue';font-size:30px;color:var(--tx)}
.stepper .val{font-family:'Bebas Neue';font-size:64px;min-width:90px;text-align:center;line-height:.8}
.whochip{display:flex;gap:8px;margin-top:10px}
.whochip button{flex:1;padding:12px;border-radius:13px;border:1px solid var(--line);background:var(--surf);font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px}
.whochip button.on1{background:var(--p1);color:#0C0D10;border-color:var(--p1)}
.whochip button.on2{background:var(--p2);color:#0C0D10;border-color:var(--p2)}
.lvlup{text-align:center}
.lvlup .big{font-family:'Bebas Neue';font-size:70px;line-height:.8}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:90}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M2 13c2.5 0 2.5-4 5-4s2.5 4 5 4 2.5-4 5-4 2.5 4 5 4" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><path d="M2 18c2.5 0 2.5-3 5-3s2.5 3 5 3 2.5-3 5-3 2.5 3 5 3" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" opacity=".5"/></svg></div>
    <div><div class="name bebas">ВОЛНА</div><div class="sub">функционал × кросс-фит</div></div>
  </div>
  <button class="iconbtn" id="settingsBtn"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.4-2.3 1a7 7 0 0 0-1.7-1l-.3-2.5H10.4l-.3 2.5a7 7 0 0 0-1.7 1l-2.3-1-2 3.4 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.4 2.3-1a7 7 0 0 0 1.7 1l.3 2.5h3.2l.3-2.5a7 7 0 0 0 1.7-1l2.3 1 2-3.4-2-1.5c.1-.3.1-.6.1-1z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg></button>
</div>

<div id="app"></div>

<nav class="nav" id="nav"></nav>

<div class="scrim" id="scrim"><div class="sheet" id="sheet"></div></div>
<div id="live"></div>
<div class="toast" id="toast"></div>

<script>
/* ====================== ВОЛНА — app logic ====================== */

/* ---------- icons ---------- */
const I={
  flame:'<svg viewBox="0 0 24 24" fill="none"><path d="M12 3c1 3 4 4 4 8a4 4 0 1 1-8 0c0-1.5.5-2.5 1-3 .3 1 1 1.5 1.5 1.5C10 8 9 6.5 12 3z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>',
  wind:'<svg viewBox="0 0 24 24" fill="none"><path d="M3 9h11a3 3 0 1 0-3-3M3 14h15a3 3 0 1 1-3 3M3 12h7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>',
  list:'<svg viewBox="0 0 24 24" fill="none"><path d="M9 6h11M9 12h11M9 18h11M4 6h.01M4 12h.01M4 18h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
  users:'<svg viewBox="0 0 24 24" fill="none"><circle cx="9" cy="8" r="3" stroke="currentColor" stroke-width="1.8"/><path d="M3 20a6 6 0 0 1 12 0M16 6a3 3 0 0 1 0 6M21 20a6 6 0 0 0-4-5.7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>',
  wave:'<svg viewBox="0 0 24 24" fill="none"><path d="M2 13c2.5 0 2.5-4 5-4s2.5 4 5 4 2.5-4 5-4 2.5 4 5 4M2 18c2.5 0 2.5-3 5-3s2.5 3 5 3 2.5-3 5-3 2.5 3 5 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
  home:'<svg viewBox="0 0 24 24" fill="none"><path d="M4 11l8-6 8 6v8a1 1 0 0 1-1 1h-4v-6H9v6H5a1 1 0 0 1-1-1z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>',
  dumbbell:'<svg viewBox="0 0 24 24" fill="none"><path d="M6.5 6.5l11 11M4 9l-1.5 1.5a1.5 1.5 0 0 0 0 2L4 14M9 4L7.5 5.5M20 15l1.5-1.5a1.5 1.5 0 0 0 0-2L20 10M15 20l1.5-1.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
  chart:'<svg viewBox="0 0 24 24" fill="none"><path d="M4 19V5M4 19h16M8 16v-5M12 16V8M16 16v-7M20 16v-3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>',
  medal:'<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="15" r="5" stroke="currentColor" stroke-width="1.8"/><path d="M9 10L7 3h10l-2 7M12 13.5l.7 1.4 1.5.2-1.1 1 .3 1.5-1.4-.7-1.4.7.3-1.5-1.1-1 1.5-.2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>',
  play:'<svg viewBox="0 0 24 24" fill="none"><path d="M7 5v14l11-7z" fill="currentColor"/></svg>',
  pause:'<svg viewBox="0 0 24 24" fill="none"><rect x="6" y="5" width="4" height="14" rx="1" fill="currentColor"/><rect x="14" y="5" width="4" height="14" rx="1" fill="currentColor"/></svg>',

/* ---------- state (cloud-synced) ---------- */
const CODE_KEY='volna_room_code', CACHE_KEY='volna_cache_v2', PEND_KEY='volna_pending_v2';
let S=null, NEED_CODE=false, lastSig='';
function getCode(){return localStorage.getItem(CODE_KEY)||'';}
function hdr(){const h={'Content-Type':'application/json'};const c=getCode();if(c)h['X-Room-Code']=c;return h;}
function pending(){try{return JSON.parse(localStorage.getItem(PEND_KEY)||'[]');}catch(e){return[];}}
function setPending(a){try{localStorage.setItem(PEND_KEY,JSON.stringify(a));}catch(e){}}
function fresh(){return{ath:[{name:'Глеб',xp:0},{name:'Партнёр',xp:0}],history:[],ach:[],setup:false};}
function rebuild(data){
  const names=(data&&data.names)||[];
  S={ath:[{name:names[0]||'Глеб',xp:0},{name:names[1]||'Партнёр',xp:0}],history:[],ach:[],setup:!!((names[0]||'').trim()||(names[1]||'').trim())};
  const seen=new Set();
  const all=[...((data&&data.events)||[]),...pending()].filter(ev=>{if(!ev||!ev.id||seen.has(ev.id))return false;seen.add(ev.id);return true;}).sort((a,b)=>a.ts-b.ts);
  all.forEach(ev=>{if(ev.type==='workout'&&S.ath[ev.ath]){S.ath[ev.ath].xp+=ev.xp;S.history.push(ev);}});
  ACH.forEach(a=>{if(a.chk(S))S.ach.push(a.id);});S.ach=[...new Set(S.ach)];
}
async function fetchState(){
  const r=await fetch('/api/state',{headers:hdr()});
  if(r.status===401){NEED_CODE=true;throw new Error('auth');}
  const d=await r.json();
  try{localStorage.setItem(CACHE_KEY,JSON.stringify(d));}catch(e){}
  return d;
}
function sigOf(d){return((d&&d.events)?d.events.length:0)+'|'+(((d&&d.names)||[]).join(','));}
async function flush(){
  const p=pending();if(!p.length)return;
  try{const r=await fetch('/api/events',{method:'POST',headers:hdr(),body:JSON.stringify({events:p})});if(r.ok)setPending([]);}catch(e){}
}
async function load(){
  await flush();
  try{const d=await fetchState();NEED_CODE=false;rebuild(d);lastSig=sigOf(d);}
  catch(e){
    if(NEED_CODE)return;
    try{const c=JSON.parse(localStorage.getItem(CACHE_KEY)||'null');rebuild(c||{names:[],events:[]});}catch(_){S=fresh();}
  }
}
async function pushEvents(evs){const p=pending();p.push(...evs);setPending(p);await flush();}
async function setNames(n0,n1){try{await fetch('/api/names',{method:'POST',headers:hdr(),body:JSON.stringify({names:[n0,n1]})});}catch(e){}}
async function resetAll(){setPending([]);try{await fetch('/api/reset',{method:'POST',headers:hdr(),body:JSON.stringify({})});}catch(e){}}
function renderGate(){
  document.querySelector('.topbar').style.visibility='hidden';
  document.getElementById('nav').style.display='none';
  const a=document.getElementById('app');
  a.innerHTML=`<div class="fade" style="padding-top:12vh;text-align:center">
    <div class="bebas" style="font-size:60px;color:var(--p1);line-height:.8">ВОЛНА</div>
    <div class="muted" style="margin-top:10px">Введите код комнаты,<br>чтобы открыть общий прогресс</div>
    <div class="card" style="margin-top:24px">
      <input id="codeIn" placeholder="код комнаты" autocapitalize="off" autocorrect="off" style="width:100%;background:var(--surf2);border:1px solid var(--line2);border-radius:12px;padding:14px;color:var(--tx);font-size:18px;font-weight:700;text-align:center;letter-spacing:.08em">
      <button class="btn go" id="codeGo" style="margin-top:14px">Войти</button>
      <div id="codeErr" style="font-size:12px;margin-top:10px;display:none;color:var(--p2t)">Неверный код, попробуйте ещё раз</div>
    </div></div>`;
  a.querySelector('#codeGo').onclick=async()=>{
    const v=a.querySelector('#codeIn').value.trim();
    localStorage.setItem(CODE_KEY,v);NEED_CODE=false;await load();
    if(NEED_CODE)a.querySelector('#codeErr').style.display='block';else render();
  };
}
function startSync(){
  setInterval(async()=>{
    if(!S||!S.setup||NEED_CODE)return;
    if(document.getElementById('live').classList.contains('on'))return;
    if(document.getElementById('scrim').classList.contains('on'))return;
    if(['home','prog','badge'].indexOf(TAB)<0)return;
    try{const d=await fetchState();const sig=sigOf(d);if(sig!==lastSig){lastSig=sig;rebuild(d);render();}}catch(e){}
  },6000);
}

/* ---------- helpers ---------- */
function dayKey(ts){const d=new Date(ts);return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function maxStreak(s){const days=[...new Set(s.history.map(h=>dayKey(h.ts)))].map(k=>{const[y,m,d]=k.split('-');return new Date(y,m-1,d).getTime();}).sort((a,b)=>a-b);if(!days.length)return 0;let best=1,cur=1;for(let i=1;i<days.length;i++){const gap=Math.round((days[i]-days[i-1])/864e5);if(gap===1)cur++;else if(gap>1)cur=1;best=Math.max(best,cur);}return best;}
function curStreak(s){const days=[...new Set(s.history.map(h=>dayKey(h.ts)))];if(!days.length)return 0;const set=new Set(days);let cur=0,d=new Date();for(let i=0;i<400;i++){if(set.has(dayKey(d.getTime())))cur++;else if(i>0)break;d.setDate(d.getDate()-1);}return cur;}
function weekStart(){const d=new Date();const day=(d.getDay()+6)%7;d.setHours(0,0,0,0);d.setDate(d.getDate()-day);return d.getTime();}
function weekXp(s,ai){return s.history.filter(h=>h.ts>=weekStart()&&h.ath===ai).reduce((a,h)=>a+h.xp,0);}
function weekCount(s,ai){return s.history.filter(h=>h.ts>=weekStart()&&h.ath===ai).length;}
function fmtTime(sec){const m=Math.floor(sec/60),s=sec%60;return m+':'+String(s).padStart(2,'0');}
function el(html){const d=document.createElement('div');d.innerHTML=html.trim();return d.firstChild;}

let AC;
function beep(freq,dur,vol){try{AC=AC||new(window.AudioContext||window.webkitAudioContext)();const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.frequency.value=freq;o.type='sine';g.gain.setValueAtTime(vol||.25,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+(dur||.15));o.start();o.stop(AC.currentTime+(dur||.15));}catch(e){}}
function beepGo(){beep(880,.18,.3);}

const POOL=[
 {n:'Трастеры',u:'повт',lo:8,hi:15},{n:'Гребля',u:'м',lo:200,hi:500,st:50},{n:'Лыжи',u:'м',lo:200,hi:500,st:50},
 {n:'Маятник с гирей',u:'повт',lo:12,hi:25},{n:'Берпи',u:'повт',lo:8,hi:18},{n:'Запрыгивания на тумбу',u:'повт',lo:10,hi:20},
 {n:'Wall ball',u:'повт',lo:8,hi:18},{n:'Отжимания на кольцах',u:'повт',lo:6,hi:14},{n:'Аэробайк',u:'кал',lo:10,hi:20},
 {n:'Подъём ног',u:'повт',lo:10,hi:20},{n:'Russian twist',u:'повт',lo:16,hi:30}];
function rnd(a,b,st){const v=a+Math.floor(Math.random()*((b-a)+1));return st?Math.round(v/st)*st:v;}
function genWod(){
  const formats=[
   {f:'amrap',label:'AMRAP 18 мин',mode:'amrap',dur:1080,score:'rounds',k:3},
   {f:'amrap',label:'AMRAP 12 мин',mode:'amrap',dur:720,score:'rounds',k:3},
   {f:'rft',label:'3 раунда на время',mode:'rounds',rounds:3,rest:60,score:'time',k:4},
   {f:'rft',label:'21-15-9 на время',mode:'rft',score:'time',k:3,ladder:true},
   {f:'emom',label:'EMOM 16 мин',mode:'emom',min:16,score:'none',k:4},
   {f:'tabata',label:'Tabata финишер',mode:'tabata',score:'none',k:4},
  ];
  const fmt=formats[Math.floor(Math.random()*formats.length)];
  const pool=[...POOL].sort(()=>Math.random()-.5).slice(0,fmt.k);
  const ex=pool.map(p=>{
    if(fmt.ladder)return{n:p.n,a:'21·15·9'+(p.u==='м'||p.u==='кал'?' '+p.u:'')};
    if(fmt.mode==='tabata')return{n:p.n,a:'20 сек'};
    if(fmt.mode==='emom')return{n:p.n,a:rnd(p.lo,Math.round(p.hi*.7),p.st)+' '+p.u};
    return{n:p.n,a:rnd(p.lo,p.hi,p.st)+(p.u==='повт'?'':' '+p.u)};
  });
  return{id:'gen',name:'СЛУЧАЙНЫЙ WOD',ic:I.dice,c:'p1',bg:'var(--p1d)',fg:'var(--p1t)',diff:1.2,gen:true,
    blocks:[
     {t:'Разминка',f:'8 мин',mode:'timer',dur:480,s:'Суставная + кардио-разгон + активация',ex:[]},
     {t:fmt.label,f:fmt.label,mode:fmt.mode,dur:fmt.dur,rounds:fmt.rounds,rest:fmt.rest,min:fmt.min,score:fmt.score,s:'Сгенерировано из ваших движений',ex},
     {t:'Заминка',f:'7 мин',mode:'timer',dur:420,s:'Растяжка всё тело',ex:[]}
    ],tip:'Каждый запуск — новая комбинация. Жми ещё раз для свежего вызова.'};
}

  <div class="badges">${ACH.map(a=>{const g=got.has(a.id);return `<div class="badge ${g?'got':'lock'}"><div class="bi">${g?a.ic:lockIc}</div><div class="bn">${a.n}</div></div>`;}).join('')}</div>
  <div class="h-sec">Рейтинг атлетов</div>
  ${[0,1].map(i=>{const s=lvlFromXp(S.ath[i].xp);const cnt=S.history.filter(h=>h.ath===i).length;return `<div class="card" style="margin-bottom:10px"><div class="row"><div class="avatar" style="background:${i===0?'var(--p1)':'var(--p2)'}">${avatarInit(S.ath[i].name)}</div><div style="flex:1"><div style="font-weight:800">${S.ath[i].name}</div><div class="dim" style="font-size:11px">${rankName(s.lvl)} · ур. ${s.lvl}</div></div><div style="text-align:right"><div class="bebas" style="font-size:24px;color:var(--gold)">${S.ath[i].xp}</div><div class="dim" style="font-size:10px">${cnt} трен.</div></div></div></div>`;}).join('')}
  `;
}
const lockIc='<svg viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="9" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M8 11V8a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="1.8"/></svg>';

/* ====================== LIVE WORKOUT ENGINE ====================== */
let LV=null;
function startWorkout(id){const w=WK.find(x=>x.id===id);startCustom(w);}
function startCustom(w){
  LV={w,bi:0,t:null,running:false,sec:0,emomMin:0,round:1,who:0,scores:{}};
  document.getElementById('live').classList.add('on');
  liveRender();
}
function exitLive(){if(LV&&LV.t)clearInterval(LV.t);LV=null;document.getElementById('live').classList.remove('on');render();}

function liveRender(){
  const L=document.getElementById('live');const w=LV.w;const b=w.blocks[LV.bi];
  const prog=w.blocks.map((_,i)=>`<i class="${i<LV.bi?'done':i===LV.bi?'now':''}"></i>`).join('');
  L.innerHTML=`
   <div class="live-top">
     <button class="iconbtn" id="lvExit">${I.x}</button>
     <div style="text-align:center"><div class="bebas" style="font-size:22px;color:${w.fg||'var(--p1)'}">${w.name}</div><div class="dim" style="font-size:10px;letter-spacing:.1em">${LV.bi+1}/${w.blocks.length} · ${b.t.toUpperCase()}</div></div>
     <div style="width:40px"></div>
   </div>
   <div class="live-prog">${prog}</div>
   <div id="lvStage" style="flex:1;display:flex;flex-direction:column;justify-content:center"></div>`;
  L.querySelector('#lvExit').onclick=()=>{if(confirm('Выйти из тренировки? Прогресс не сохранится.'))exitLive();};
  stage(b);
}

function stage(b){
  const st=document.getElementById('lvStage');
  // reset timer state per block
  if(LV.t)clearInterval(LV.t);LV.running=false;
  const isCount = b.mode==='rft'||b.mode==='rounds';
  LV.sec = isCount?0:(b.mode==='amrap'?b.dur:(b.mode==='timer'?b.dur:0));
  LV.emomMin=0;LV.tabRound=0;LV.tabWork=true;LV.round=1;

  if(b.mode==='timer'||b.mode==='amrap'){
    st.innerHTML=`
     ${b.ex.length?'':''}
     <div class="ring" id="ring"></div>
     <div class="timersub">${b.mode==='amrap'?'AMRAP · осталось':'таймер'}</div>
     ${b.ex.length?`<div class="exlist" style="flex:0;max-height:200px;margin-top:10px">${b.ex.map((e,i)=>exli(e,i)).join('')}</div>`:`<div class="card" style="margin-top:14px"><div class="muted" style="font-size:13px">${b.s}</div></div>`}
     <div class="ctrls"><button class="btn go" id="lvPlay">${I.play} Старт</button><button class="btn ghost" id="lvNext">Дальше →</button></div>`;
    drawRing();LV.dur=LV.sec;updateRing();
  } else if(b.mode==='emom'){
    st.innerHTML=`
     <div class="timer" id="lvT">${b.min}:00</div>
     <div class="timersub" id="lvSub">EMOM · минута 1 / ${b.min}</div>
     <div class="exlist" style="flex:0;max-height:240px;margin-top:14px">${b.ex.map((e,i)=>exli(e,i)).join('')}</div>
     <div class="ctrls"><button class="btn go" id="lvPlay">${I.play} Старт</button><button class="btn ghost" id="lvNext">Дальше →</button></div>`;
    LV.sec=b.min*60;
  } else if(b.mode==='tabata'){
    st.innerHTML=`
     <div class="timer" id="lvT" style="color:var(--p1)">20</div>
     <div class="timersub" id="lvSub">TABATA · работа · раунд 1/8</div>
     <div class="exlist" style="flex:0;max-height:200px;margin-top:14px">${b.ex.map((e,i)=>exli(e,i)).join('')}</div>
     <div class="ctrls"><button class="btn go" id="lvPlay">${I.play} Старт</button><button class="btn ghost" id="lvNext">Дальше →</button></div>`;
    LV.sec=20;
  } else { // rft / rounds (count up)
    st.innerHTML=`
     <div class="timer" id="lvT">0:00</div>
     <div class="timersub" id="lvSub">${b.mode==='rounds'?'раунд 1'+(b.rounds?' / '+b.rounds:''):'на время'}</div>
     <div class="exlist" style="flex:0;max-height:260px;margin-top:14px">${b.ex.map((e,i)=>exli(e,i)).join('')}</div>
     <div class="ctrls"><button class="btn go" id="lvPlay">${I.play} Старт</button>${b.mode==='rounds'&&b.rounds?`<button class="btn ghost" id="lvRound">Раунд +</button>`:''}<button class="btn coral" id="lvFinish">Финиш</button></div>`;
  }
  const pb=document.getElementById('lvPlay');if(pb)pb.onclick=()=>toggleTimer(b);
  const nx=document.getElementById('lvNext');if(nx)nx.onclick=()=>nextBlock();
  const fn=document.getElementById('lvFinish');if(fn)fn.onclick=()=>{if(LV.running)toggleTimer(b);blockScore(b);};
  const rd=document.getElementById('lvRound');if(rd)rd.onclick=()=>{LV.round++;const sub=document.getElementById('lvSub');if(sub)sub.textContent='раунд '+LV.round+(b.rounds?' / '+b.rounds:'');beepTick();if(b.rounds&&LV.round>b.rounds){if(LV.running)toggleTimer(b);blockScore(b);}};
}
function exli(e,i){return `<div class="exli"><div class="num">${i+1}</div><div class="nm">${e.n}${e.no?`<small>${e.no}</small>`:''}</div><div class="rp">${e.a||''}</div></div>`;}

function drawRing(){const r=document.getElementById('ring');if(!r)return;r.innerHTML=`<svg width="230" height="230" viewBox="0 0 230 230"><circle cx="115" cy="115" r="104" fill="none" stroke="var(--surf3)" stroke-width="12"/><circle id="ringP" cx="115" cy="115" r="104" fill="none" stroke="var(--p1)" stroke-width="12" stroke-linecap="round" stroke-dasharray="${2*Math.PI*104}" stroke-dashoffset="0"/></svg><div class="ctr"><div class="timer" id="lvT" style="font-size:64px">${fmtTime(LV.sec)}</div><div class="dim" style="font-size:11px;letter-spacing:.1em">МИН : СЕК</div></div>`;}
function updateRing(){const p=document.getElementById('ringP');const t=document.getElementById('lvT');if(t)t.textContent=fmtTime(LV.sec);if(p&&LV.dur){const c=2*Math.PI*104;p.style.strokeDashoffset=c*(1-LV.sec/LV.dur);}}

function toggleTimer(b){
  const pb=document.getElementById('lvPlay');
  if(LV.running){clearInterval(LV.t);LV.running=false;if(pb)pb.innerHTML=I.play+' Продолжить';return;}
  LV.running=true;if(pb)pb.innerHTML=I.pause+' Пауза';beepGo();
  LV.t=setInterval(()=>tick(b),1000);
}
function tick(b){
  const t=document.getElementById('lvT'),sub=document.getElementById('lvSub');
  if(b.mode==='timer'||b.mode==='amrap'){
    LV.sec--;updateRing();
    if(LV.sec<=3&&LV.sec>0)beepTick();
    if(LV.sec<=0){clearInterval(LV.t);LV.running=false;beepDone();if(b.mode==='amrap'){blockScore(b);}else{toast('Блок завершён!',I.check);nextBlock();}}
  } else if(b.mode==='emom'){
    LV.sec--;
    const elapsed=b.min*60-LV.sec;const curMin=Math.floor(elapsed/60)+1;const inMin=elapsed%60;
    if(t)t.textContent=fmtTime(LV.sec);
    if(inMin===0){beepGo();if(sub)sub.textContent='EMOM · минута '+Math.min(curMin,b.min)+' / '+b.min;}
    else if(60-inMin<=3)beepTick();
    if(LV.sec<=0){clearInterval(LV.t);LV.running=false;beepDone();toast('EMOM завершён!',I.check);nextBlock();}
  } else if(b.mode==='tabata'){
    LV.sec--;
    if(t)t.textContent=LV.sec;
    if(LV.sec<=3&&LV.sec>0)beepTick();
    if(LV.sec<=0){
      if(LV.tabWork){LV.tabWork=false;LV.sec=10;t.style.color='var(--p2)';if(sub)sub.textContent='TABATA · отдых · раунд '+(LV.tabRound+1)+'/8';beep(440,.15);}
      else{LV.tabRound++;if(LV.tabRound>=8){clearInterval(LV.t);LV.running=false;beepDone();toast('Tabata добита!',I.check);nextBlock();return;}LV.tabWork=true;LV.sec=20;t.style.color='var(--p1)';if(sub)sub.textContent='TABATA · работа · раунд '+(LV.tabRound+1)+'/8';beepGo();}
    }
  } else { // count up
    LV.sec++;if(t)t.textContent=fmtTime(LV.sec);
  }
}

function nextBlock(){
  if(LV.bi<LV.w.blocks.length-1){LV.bi++;liveRender();}
  else finishWorkout();
}

/* score input for a scored block, then advance */
function blockScore(b){
  if(b.score==='none'||!b.score){nextBlock();return;}
  const st=document.getElementById('lvStage');
  if(b.score==='rounds'){
    LV._rounds=LV._rounds||0;
    st.innerHTML=`<div style="text-align:center"><div class="timersub">Сколько раундов закрыли?</div>
      <div class="stepper"><button id="mm">–</button><div class="val bebas" id="rv">0</div><button id="pp">+</button></div>
      <div class="muted" style="font-size:12px">+ можно добить остаток повторов вручную в истории</div>
      <button class="btn go" id="saveSc" style="margin-top:20px">${I.check} Засчитать</button></div>`;
    let val=0;const rv=st.querySelector('#rv');
    st.querySelector('#pp').onclick=()=>{val++;rv.textContent=val;beepTick();};
    st.querySelector('#mm').onclick=()=>{if(val>0)val--;rv.textContent=val;};
    st.querySelector('#saveSc').onclick=()=>{LV.scores[b.t]=val+' раундов';nextBlock();};
  } else { // time
    st.innerHTML=`<div style="text-align:center"><div class="timersub">Ваше время</div>
      <div class="timer" style="font-size:80px">${fmtTime(LV.sec)}</div>
      <button class="btn go" id="saveSc" style="margin-top:14px">${I.check} Засчитать время</button></div>`;
    st.querySelector('#saveSc').onclick=()=>{LV.scores[b.t]=fmtTime(LV.sec);nextBlock();};
  }
}

/* finish — pick who, award XP */
function finishWorkout(){
  const w=LV.w;
  let durMin=100;
  if(!w.gen&&w.tags){const tg=w.tags.find(t=>/мин/.test(t));if(tg){const m=tg.match(/\d+/);if(m)durMin=parseInt(m[0]);}}
  const baseXp=Math.round((w.gen?60:Math.min(durMin,120))*(w.diff||1.2)+40);
  const scoreStr=Object.entries(LV.scores).map(([k,v])=>v).join(' · ');
  const st=document.getElementById('lvStage');
  document.querySelector('.live-prog').innerHTML=LV.w.blocks.map(()=>'<i class="done"></i>').join('');
  st.innerHTML=`<div class="lvlup fade">
     <div style="color:var(--gold)">${I.trophy}</div>
     <div class="big bebas">WOD ЗАКРЫТ</div>
     <div class="muted" style="margin-top:4px">${w.name}${scoreStr?' · '+scoreStr:''}</div>
     <div class="pill" style="background:rgba(255,194,71,.18);color:var(--gold);margin-top:14px;font-size:14px">${I.bolt} +${baseXp} XP</div>
     <div class="timersub" style="margin-top:24px">Кто выполнил?</div>
     <div class="whochip" id="whochip">
       <button data-i="0">${avatarInit(S.ath[0].name)} · ${S.ath[0].name}</button>
       <button data-i="1">${avatarInit(S.ath[1].name)} · ${S.ath[1].name}</button>
     </div>
     <div class="whochip" style="margin-top:8px"><button data-i="2" style="flex:1">${I.users} Оба (дуэт)</button></div>
     <button class="btn ghost" id="lvDone" style="margin-top:18px;opacity:.5" disabled>Выбери атлета</button>
   </div>`;
  let who=null;
  st.querySelectorAll('.whochip button').forEach(btn=>btn.onclick=()=>{
    st.querySelectorAll('.whochip button').forEach(x=>x.className='');
    who=parseInt(btn.dataset.i);
    btn.classList.add(who===1?'on2':'on1');
    const d=st.querySelector('#lvDone');d.disabled=false;d.style.opacity=1;d.innerHTML=I.check+' Сохранить результат';beepTick();
  });
  st.querySelector('#lvDone').onclick=async()=>{
    if(who===null)return;
    const ts=Date.now();
    const targets = who===2?[0,1]:[who];
    const before=[lvlFromXp(S.ath[0].xp).lvl,lvlFromXp(S.ath[1].xp).lvl];
    const evs=targets.map(i=>({id:ts+'-'+i+'-'+Math.random().toString(36).slice(2,7),ts,type:'workout',wid:w.gen?'gen':w.id,wname:w.name,ath:i,xp:baseXp,result:scoreStr}));
    evs.forEach(ev=>{S.ath[ev.ath].xp+=ev.xp;S.history.push(ev);});
    const prev=new Set(S.ach);ACH.forEach(a=>{if(a.chk(S))S.ach.push(a.id);});S.ach=[...new Set(S.ach)];
    const newBadges=S.ach.filter(x=>!prev.has(x));
    await pushEvents(evs);
    // level up?
    const after=[lvlFromXp(S.ath[0].xp).lvl,lvlFromXp(S.ath[1].xp).lvl];
    const lvUp=targets.find(i=>after[i]>before[i]);
    exitLive();
    if(lvUp!==undefined)setTimeout(()=>toast(S.ath[lvUp].name+' → уровень '+after[lvUp]+'! '+rankName(after[lvUp]),I.crown),300);
    else setTimeout(()=>toast('+'+baseXp+' XP записано',I.check),300);
    if(newBadges.length)setTimeout(()=>{const a=ACH.find(x=>x.id===newBadges[0]);toast('Награда: '+a.n,I.medal);},lvUp!==undefined?2800:2600);
  };
  beepDone();
}

/* ---------- settings ---------- */
document.getElementById('settingsBtn').onclick=()=>{
  const sc=document.getElementById('scrim'),sh=document.getElementById('sheet');
  sh.innerHTML=`<div class="row" style="justify-content:space-between"><div class="bebas" style="font-size:26px">Настройки</div><button class="iconbtn" id="clx">${I.x}</button></div>
   <div class="h-sec" style="margin-top:18px">Имена атлетов</div>
   <input id="sn1" value="${S.ath[0].name}" style="width:100%;margin-bottom:10px;background:var(--surf);border:1px solid var(--line2);border-radius:12px;padding:12px;color:var(--tx);font-weight:700">
   <input id="sn2" value="${S.ath[1].name}" style="width:100%;background:var(--surf);border:1px solid var(--line2);border-radius:12px;padding:12px;color:var(--tx);font-weight:700">
   <button class="btn go" id="ssave" style="margin-top:16px">${I.check} Сохранить</button>
   <button class="btn ghost" id="sreset" style="margin-top:10px;color:var(--p2t)">Сбросить весь прогресс</button>`;
  sc.classList.add('on');
  sh.querySelector('#clx').onclick=()=>sc.classList.remove('on');
  sc.onclick=e=>{if(e.target===sc)sc.classList.remove('on');};
  sh.querySelector('#ssave').onclick=async()=>{S.ath[0].name=(sh.querySelector('#sn1').value||'Атлет 1').slice(0,14);S.ath[1].name=(sh.querySelector('#sn2').value||'Атлет 2').slice(0,14);await setNames(S.ath[0].name,S.ath[1].name);sc.classList.remove('on');render();toast('Сохранено',I.check);};
  sh.querySelector('#sreset').onclick=async()=>{if(confirm('Удалить весь прогресс, XP и историю у ОБОИХ? Это необратимо.')){await resetAll();await load();sc.classList.remove('on');render();}};
};

/* ---------- boot ---------- */
(async function(){await load();render();startSync();})();

</script>
</body>
</html>
